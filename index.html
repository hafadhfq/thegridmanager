<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Grid Manager</title>
    <style>
        body {
            background-color: #111;
            color: white;
            font-family: sans-serif;
            text-align: center;
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            min-height: 90vh;
        }
        h1 {
            font-size: 36px;
            margin-bottom: 5px;
            color: #ff1801; /* Merah Balap */
            text-transform: uppercase;
            letter-spacing: 2px;
        }
        p {
            color: #888;
            margin-bottom: 30px;
        }
        .box {
            background: #222;
            padding: 20px;
            border-radius: 15px;
            border: 1px solid #333;
            max-width: 400px;
            margin: 0 auto;
        }
        input {
            width: 90%;
            padding: 12px;
            margin: 10px 0;
            background: #000;
            border: 1px solid #444;
            color: white;
            border-radius: 8px;
            outline: none;
        }
        input:focus {
            border-color: #ff1801;
        }
        .btn-main {
            display: block;
            width: 100%;
            padding: 12px;
            margin-top: 15px;
            background: #ff1801;
            color: white;
            text-decoration: none;
            border-radius: 8px;
            font-weight: bold;
            border: none;
            cursor: pointer;
        }
        .btn-sec {
            display: block;
            width: 100%;
            padding: 12px;
            margin-top: 10px;
            background: transparent;
            color: #aaa;
            text-decoration: none;
            border: 1px solid #444;
            border-radius: 8px;
        }
        .footer {
            margin-top: 30px;
            font-size: 12px;
            color: #555;
        }
    </style>
</head>
<body>

    <div class="box">
        <h1>GRID MANAGER</h1>
        <p>Mulai karir manajermu sekarang.</p>

        <!-- Form Login Sederhana -->
        <form action="/login" method="post">
            <input type="text" name="user" placeholder="Username Tim" required>
            <input type="password" name="pass" placeholder="Password" required>
            <button type="submit" class="btn-main">MASUK GARASI</button>
        </form>

        <a href="/register" class="btn-sec">Daftar Tim Baru</a>
    </div>

    <div class="footer">
        &copy; 2026 Grid Manager WAP
    </div>

</body>
</html>
