<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Klasemen - Grid Manager</title>
    <link href="https://fonts.googleapis.com/css2?family=Racing+Sans+One&family=Roboto:wght@400;700&display=swap" rel="stylesheet">
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        
        body {
            background-color: #0f0f0f;
            color: #e0e0e0;
            font-family: 'Roboto', sans-serif;
            padding-bottom: 90px;
        }

        /* --- HEADER --- */
        .app-header {
            background: #1a1a1a;
            padding: 15px 20px;
            border-bottom: 1px solid #333;
            display: flex;
            justify-content: space-between;
            align-items: center;
            position: sticky; top: 0; z-index: 100;
        }
        .logo { font-family: 'Racing Sans One'; font-size: 20px; color: white; text-decoration: none; }
        .logo span { color: #ff1801; }

        /* --- TABS --- */
        .standing-tabs {
            display: flex;
            background: #1a1a1a;
            border-bottom: 1px solid #333;
            position: sticky; top: 56px; z-index: 99;
        }
        .tab-btn {
            flex: 1; padding: 12px; text-align: center; background: transparent;
            border: none; color: #666; font-weight: bold; cursor: pointer; font-size: 13px;
        }
        .tab-btn.active { color: #ff1801; border-bottom: 3px solid #ff1801; }

        /* --- COMPACT TABLE --- */
        .table-container { padding: 15px; display: none; }
        .table-container.active { display: block; }

        .standings-table { width: 100%; border-collapse: collapse; }
        
        .standings-table th {
            text-align: left; color: #666; font-size: 10px; text-transform: uppercase;
            padding: 8px 5px; border-bottom: 1px solid #333;
        }

        .standings-table td {
            padding: 10px 5px; border-bottom: 1px solid #222; vertical-align: middle;
        }

        /* Kolom Posisi */
        .pos-col { width: 25px; font-weight: bold; color: #666; text-align: center; font-size: 12px; }
        .pos-1 { color: #ffd700; } .pos-2 { color: #c0c0c0; } .pos-3 { color: #cd7f32; }

        /* Kolom Info (Logo + Nama + Negara) */
        .info-col { display: flex; align-items: center; gap: 10px; }
        .team-logo { 
            width: 24px; height: 24px; border-radius: 50%; 
            background: #333; display: flex; align-items: center; justify-content: center;
            font-size: 10px; font-weight: bold; color: white; border: 1px solid #444;
        }
        .driver-info { display: flex; flex-direction: column; }
        .name-flag { font-size: 13px; font-weight: bold; color: white; }
        .team-name-sub { font-size: 10px; color: #888; margin-top: 2px; }

        /* Poin */
        .pts-col { text-align: right; font-weight: bold; color: #00ff00; font-size: 13px; }

        /* Highlight Player */
        .player-row { background: rgba(255, 24, 1, 0.1); }

        /* --- BOTTOM NAV --- */
        .bottom-nav {
            position: fixed; bottom: 0; left: 0; width: 100%;
            background: #1a1a1a; border-top: 1px solid #333;
            display: flex; justify-content: space-around; padding: 12px 0; z-index: 100;
        }
        .nav-link { text-align: center; color: #666; text-decoration: none; font-size: 10px; flex: 1; }
        .nav-link.active { color: #ff1801; }
        .nav-ico { display: block; font-size: 22px; margin-bottom: 4px; }
    </style>
</head>
<body>

    <!-- Header -->
    <div class="app-header">
        <a href="dashboard.html" class="logo">GRID <span>MANAGER</span></a>
        <a href="dashboard.html" style="font-size: 12px; color: #aaa; text-decoration: none;">🏠 Dashboard</a>
    </div>

    <!-- Tabs -->
    <div class="standing-tabs">
        <button class="tab-btn active" onclick="switchTab('drivers')">DRIVER</button>
        <button class="tab-btn" onclick="switchTab('teams')">KONSTRUKTOR</button>
    </div>

    <!-- Driver Standings -->
    <div id="drivers" class="table-container active">
        <table class="standings-table">
            <thead>
                <tr>
                    <th>#</th>
                    <th>NAMA</th>
                    <th style="text-align:right">PTS</th>
                </tr>
            </thead>
            <tbody>
                <!-- P1 -->
                <tr>
                    <td class="pos-col pos-1">1</td>
                    <td>
                        <div class="info-col">
                            <div class="team-logo" style="background:#0055ff">RB</div>
                            <div class="driver-info">
                                <span class="name-flag">M. Verstappen 🇳🇱</span>
                                <span class="team-name-sub">Red Bull Racing</span>
                            </div>
                        </div>
                    </td>
                    <td class="pts-col">210</td>
                </tr>
                <!-- P2 -->
                <tr>
                    <td class="pos-col pos-2">2</td>
                    <td>
                        <div class="info-col">
                            <div class="team-logo" style="background:#00d2be">ME</div>
                            <div class="driver-info">
                                <span class="name-flag">L. Hamilton 🇬🇧</span>
                                <span class="team-name-sub">Mercedes AMG</span>
                            </div>
                        </div>
                    </td>
                    <td class="pts-col">185</td>
                </tr>
                <!-- P3 -->
                <tr>
                    <td class="pos-col pos-3">3</td>
                    <td>
                        <div class="info-col">
                            <div class="team-logo" style="background:#ff1801">FE</div>
                            <div class="driver-info">
                                <span class="name-flag">C. Leclerc 🇲🇨</span>
                                <span class="team-name-sub">Ferrari</span>
                            </div>
                        </div>
                    </td>
                    <td class="pts-col">172</td>
                </tr>
                <!-- Player Row -->
                <tr class="player-row">
                    <td class="pos-col">7</td>
                    <td>
                        <div class="info-col">
                            <div class="team-logo" style="background:#ff1801">SG</div>
                            <div class="driver-info">
                                <span class="name-flag">YOU (Player) 🇮🇩</span>
                                <span class="team-name-sub">Scuderia Grid</span>
                            </div>
                        </div>
                    </td>
                    <td class="pts-col">85</td>
                </tr>
            </tbody>
        </table>
    </div>

    <!-- Team Standings -->
    <div id="teams" class="table-container">
        <table class="standings-table">
            <thead>
                <tr>
                    <th>#</th>
                    <th>TEAM</th>
                    <th style="text-align:right">PTS</th>
                </tr>
            </thead>
            <tbody>
                <tr>
                    <td class="pos-col pos-1">1</td>
                    <td>
                        <div class="info-col">
                            <div class="team-logo" style="background:#0055ff">RB</div>
                            <div class="driver-info">
                                <span class="name-flag">Red Bull Racing</span>
                            </div>
                        </div>
                    </td>
                    <td class="pts-col">350</td>
                </tr>
                <tr>
                    <td class="pos-col pos-2">2</td>
                    <td>
                        <div class="info-col">
                            <div class="team-logo" style="background:#ff1801">FE</div>
                            <div class="driver-info">
                                <span class="name-flag">Ferrari</span>
                            </div>
                        </div>
                    </td>
                    <td class="pts-col">290</td>
                </tr>
                <!-- Player Team -->
                <tr class="player-row">
                    <td class="pos-col">4</td>
                    <td>
                        <div class="info-col">
                            <div class="team-logo" style="background:#ff1801">SG</div>
                            <div class="driver-info">
                                <span class="name-flag">Scuderia Grid</span>
                            </div>
                        </div>
                    </td>
                    <td class="pts-col">110</td>
                </tr>
            </tbody>
        </table>
    </div>

    <!-- Bottom Navigation -->
    <div class="bottom-nav">
        <a href="dashboard.html" class="nav-link"><span class="nav-ico">🏠</span>Home</a>
        <a href="race-hub.html" class="nav-link"><span class="nav-ico">🚩</span>Race</a>
        <a href="garage.html" class="nav-link"><span class="nav-ico">🔧</span>Garasi</a>
        <a href="standing.html" class="nav-link active"><span class="nav-ico">🏆</span>Klasmen</a>
    </div>

    <script>
        function switchTab(tabName) {
            document.getElementById('drivers').classList.remove('active');
            document.getElementById('teams').classList.remove('active');
            const buttons = document.querySelectorAll('.tab-btn');
            buttons.forEach(btn => btn.classList.remove('active'));
            document.getElementById(tabName).classList.add('active');
            event.currentTarget.classList.add('active');
        }
    </script>
</body>
</html>
