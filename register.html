<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Grid Manager - Daftar</title>
    
    <!-- Import Font Google -->
    <link href="https://fonts.googleapis.com/css2?family=Racing+Sans+One&family=Roboto:wght@400;700&display=swap" rel="stylesheet">

    <style>
        /* --- RESET & DASAR --- */
        * { box-sizing: border-box; }
        
        body {
            background-color: #0f0f0f;
            background-image: radial-gradient(circle at 50% 0%, #2a2a2a 0%, #0f0f0f 70%);
            color: #e0e0e0;
            font-family: 'Roboto', sans-serif;
            margin: 0;
            padding: 0;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        /* --- WRAPPER --- */
        .register-wrapper {
            width: 100%;
            max-width: 480px;
            padding: 30px 20px;
        }

        /* --- HEADER --- */
        .reg-header {
            text-align: center;
            margin-bottom: 30px;
        }

        .reg-title {
            font-family: 'Racing Sans One', cursive;
            font-size: 36px;
            margin: 0;
            color: white;
            letter-spacing: 1px;
        }

        .reg-sub {
            color: #ff1801;
            font-size: 12px;
            font-weight: bold;
            letter-spacing: 2px;
            margin-top: 5px;
        }

        /* --- KARTU FORM --- */
        .reg-card {
            background: rgba(30, 30, 30, 0.7);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 20px;
            padding: 30px 25px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.5);
        }

        /* --- INPUT --- */
        .input-group {
            margin-bottom: 15px;
            text-align: left;
        }

        .input-label {
            display: block;
            font-size: 12px;
            color: #aaa;
            margin-bottom: 5px;
            margin-left: 5px;
        }

        .gm-input {
            width: 100%;
            padding: 12px 15px;
            background: #000;
            border: 1px solid #333;
            border-radius: 10px;
            color: white;
            font-size: 16px;
            outline: none;
            transition: 0.3s;
        }

        .gm-input:focus {
            border-color: #ff1801;
            box-shadow: 0 0 8px rgba(255, 24, 1, 0.2);
        }

        /* --- TOMBOL GLOSSY --- */
        .btn-glossy-red {
            position: relative;
            display: block;
            width: 100%;
            padding: 15px;
            margin-top: 25px;
            background: linear-gradient(180deg, #ff4d4d 0%, #cc0000 100%);
            border-radius: 50px;
            color: white;
            font-family: 'Racing Sans One', cursive;
            font-size: 20px;
            text-align: center;
            text-decoration: none;
            border: none;
            cursor: pointer;
            overflow: hidden;
            box-shadow: 0 5px 15px rgba(204, 0, 0, 0.4);
            transition: transform 0.1s;
        }

        .btn-glossy-red:active {
            transform: scale(0.97);
        }

        /* --- LINK LOGIN --- */
        .login-link {
            text-align: center;
            margin-top: 25px;
            font-size: 14px;
            color: #888;
        }

        .login-link a {
            color: #ff1801;
            text-decoration: none;
            font-weight: bold;
        }

        .login-link a:hover {
            text-decoration: underline;
        }
    </style>
</head>
<body>

    <div class="register-wrapper">
        
        <div class="reg-header">
            <h1 class="reg-title">GABUNG GRID</h1>
            <div class="reg-sub">BUAT TIM BARU</div>
        </div>

        <div class="reg-card">
            <form action="/register_process" method="post">
                
                <!-- Nama Tim (Khas Game Manajemen) -->
                <div class="input-group">
                    <label class="input-label">NAMA TIM</label>
                    <input type="text" name="team_name" class="gm-input" placeholder="Contoh: Red Bull Racing" required>
                </div>

                <!-- Username Login -->
                <div class="input-group">
                    <label class="input-label">USERNAME PEMILIK</label>
                    <input type="text" name="username" class="gm-input" placeholder="Username unik" required>
                </div>
                
                <!-- Password -->
                <div class="input-group">
                    <label class="input-label">PASSWORD</label>
                    <input type="password" name="password" class="gm-input" placeholder="Minimal 6 karakter" required>
                </div>

                <!-- Konfirmasi Password -->
                <div class="input-group">
                    <label class="input-label">ULANGI PASSWORD</label>
                    <input type="password" name="confirm_password" class="gm-input" placeholder="Ulangi password" required>
                </div>

                <button type="submit" class="btn-glossy-red">
                    DAFTAR SEKARANG
                </button>

            </form>

            <div class="login-link">
                Sudah punya tim? <a href="/index">Masuk di sini</a>
            </div>
        </div>

    </div>

</body>
</html>
