<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Race Day - Grid Manager</title>
    <link href="https://fonts.googleapis.com/css2?family=Racing+Sans+One&family=Roboto:wght@400;700&display=swap" rel="stylesheet">
    <style>
        body { background-color: #0f0f0f; color: white; font-family: 'Roboto', sans-serif; padding-bottom: 80px; }
        .app-header { background: #1a1a1a; padding: 15px 20px; border-bottom: 1px solid #333; display: flex; justify-content: space-between; align-items: center; }
        .logo { font-family: 'Racing Sans One', cursive; font-size: 20px; color: white; text-decoration: none; }
        .logo span { color: #ff1801; }
        
        .session-title { text-align: center; padding: 20px; font-family: 'Racing Sans One', cursive; font-size: 24px; color: #ff1801; }
        
        .grid-container { padding: 0 20px; }
        .grid-row {
            display: flex; justify-content: space-between; align-items: center;
            background: #1a1a1a; border: 1px solid #333; border-radius: 10px;
            padding: 15px; margin-bottom: 10px; transition: 0.3s;
        }
        .pos-num { font-family: 'Racing Sans One', cursive; font-size: 24px; color: #666; width: 40px; }
        .driver-info h4 { margin: 0; font-size: 16px; }
        .driver-info p { margin: 2px 0 0; font-size: 12px; color: #888; }
        .lap-time { font-family: monospace; color: #00ff00; font-size: 14px; }
        
        .action-area { text-align: center; padding: 30px; }
        .btn-race {
            background: linear-gradient(180deg, #ff4d4d 0%, #cc0000 100%);
            color: white; border: none; padding: 15px 40px; border-radius: 50px;
            font-family: 'Racing Sans One', cursive; font-size: 20px; cursor: pointer;
            box-shadow: 0 5px 15px rgba(204, 0, 0, 0.4);
        }

        /* Bottom Nav */
        .bottom-nav { position: fixed; bottom: 0; left: 0; width: 100%; background: #1a1a1a; border-top: 1px solid #333; display: flex; justify-content: space-around; padding: 12px 0; }
        .nav-item { text-align: center; color: #666; text-decoration: none; font-size: 10px; }
        .nav-item.active { color: #ff1801; }
        .nav-icon { display: block; font-size: 20px; margin-bottom: 4px; }
    </style>
</head>
<body>

    <div class="app-header">
        <a href="dashboard.html" class="logo">GRID <span>MANAGER</span></a>
        <a href="dashboard.html" style="font-size:12px; color:#aaa; text-decoration:none;">🏠 Dashboard</a>
    </div>

    <div class="session-title" id="sessionTitle">QUALIFYING SESSION</div>

    <div class="grid-container" id="resultsContainer">
        <!-- Hasil akan muncul di sini -->
        <p style="text-align:center; color:#666;">Tekan tombol di bawah untuk memulai sesi.</p>
    </div>

    <div class="action-area">
        <button class="btn-race" onclick="startSession()">MULAI SESI</button>
    </div>

    <div class="bottom-nav">
        <a href="dashboard.html" class="nav-item"><span class="nav-icon">🏠</span>Home</a>
        <a href="race-hub.html" class="nav-item active"><span class="nav-icon">🚩</span>Race</a>
        <a href="profile.html" class="nav-item"><span class="nav-icon">⚙️</span>Profil</a>
    </div>
