<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Grid Strategist Mobile</title>
    <link href="https://fonts.googleapis.com/css2?family=Racing+Sans+One&family=Roboto:wght@400;500;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-dark: #0f0f0f;
            --bg-panel: #1a1a1a;
            --border: #333;
            --text-main: #e0e0e0;
            --accent: #ff1801;
            --pit-color: #00d2be;
            --push-color: #ff1801;
            --defend-color: #0055ff;
            /* Safe area for mobile browsers */
            --safe-bottom: env(safe-area-inset-bottom, 20px); 
        }

        * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
        
        body {
            background-color: var(--bg-dark);
            color: var(--text-main);
            font-family: 'Roboto', sans-serif;
            height: 100vh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        /* --- HEADER --- */
        .app-header {
            background: var(--bg-panel);
            padding: 15px 20px;
            border-bottom: 2px solid var(--accent);
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-shrink: 0;
            z-index: 10;
        }
        .brand { font-family: 'Racing Sans One'; font-size: 20px; color: white; font-style: italic; }
        .brand span { color: var(--accent); }
        .track-info { text-align: right; font-size: 11px; color: #888; line-height: 1.2; }
        .track-info b { color: white; font-size: 12px; }

        /* --- MAIN CONTENT (SCROLLABLE) --- */
        .main-container {
            flex: 1;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            /* Padding bottom besar agar konten tidak tertutup footer/nav bar */
            padding-bottom: 180px; 
        }

        /* TIMING SECTION (Top on Mobile) */
        .timing-section {
            background: var(--bg-panel);
            border-bottom: 1px solid var(--border);
        }
        .panel-head {
            padding: 10px 15px;
            background: #222;
            font-size: 11px;
            font-weight: bold;
            text-transform: uppercase;
            color: var(--accent);
            border-bottom: 1px solid var(--border);
        }
        
        .t-row {
            display: flex;
            align-items: center;
            padding: 12px 15px;
            border-bottom: 1px solid #222;
            font-size: 14px;
        }
        .t-row.player { background: rgba(255, 215, 0, 0.08); border-left: 3px solid gold; }
        
        .t-pos { width: 25px; font-weight: bold; color: #666; font-size: 14px; }
        .t-driver { flex: 1; display: flex; flex-direction: column; gap: 6px; }
        .d-name { font-weight: 600; color: white; display: flex; align-items: center; gap: 6px; font-size: 15px; }
        .team-dot { width: 4px; height: 14px; border-radius: 2px; }
        
        .resources { display: flex; align-items: center; gap: 8px; font-size: 11px; color: #888; }
        .res-bar { width: 40px; height: 4px; background: #333; border-radius: 2px; position: relative; top: 1px; }
        .res-fill { height: 100%; border-radius: 2px; transition: width 0.5s; }
        .fill-fuel { background: #00d2be; }
        .fill-tire { background: #ffaa00; }

        .t-gap { 
            font-family: monospace; 
            font-size: 13px; 
            color: #888; 
            text-align: right;
            min-width: 60px;
            font-weight: 500;
        }

        /* COMMENTARY SECTION */
        .comm-section {
            flex: 1;
            background: #121212;
            min-height: 300px; /* Ensure scrollable area */
        }
        .comm-feed {
            padding: 15px;
            display: flex;
            flex-direction: column-reverse; /* Newest at bottom visually if we didn't use prepend, but here we prepend so reverse makes sense for chat style */
        }
        .c-item {
            margin-bottom: 12px;
            padding: 12px;
            background: #1a1a1a;
            border-radius: 8px;
            border-left: 3px solid #333;
            font-size: 13px;
            line-height: 1.4;
        }
        .c-item.strat { border-left-color: var(--pit-color); background: rgba(0, 210, 190, 0.1); }
        .c-item.danger { border-left-color: var(--accent); color: #ffaaaa; }
        .c-lap { font-weight: bold; color: #666; font-size: 10px; margin-right: 8px; display: inline-block; width: 25px;}

        /* --- FIXED BOTTOM CONTROL PANEL --- */
        .strategy-footer {
            position: fixed;
            bottom: 0;
            left: 0;
            width: 100%;
            background: #1a1a1a;
            border-top: 1px solid var(--border);
            padding: 15px 20px;
            /* Critical: Add padding for mobile nav bars */
            padding-bottom: calc(15px + var(--safe-bottom)); 
            z-index: 100;
            box-shadow: 0 -5px 20px rgba(0,0,0,0.8);
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .footer-top-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .lap-counter {
            font-family: 'Racing Sans One';
            font-size: 28px;
            color: white;
            font-style: italic;
        }
        .lap-total { font-size: 14px; color: #666; font-family: 'Roboto'; font-style: normal; }

        .mode-selector select {
            background: #333; color: white; border: 1px solid #555;
            padding: 8px 12px; border-radius: 6px; font-size: 12px;
            outline: none;
        }

        .action-buttons {
            display: grid;
            grid-template-columns: 1fr 1fr 1fr;
            gap: 10px;
        }
        
        .btn-action {
            padding: 12px 5px;
            border-radius: 8px;
            border: none;
            font-weight: bold;
            cursor: pointer;
            font-size: 13px;
            text-transform: uppercase;
            color: white;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 4px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.3);
        }
        .btn-action small { font-size: 10px; opacity: 0.8; font-weight: normal; text-transform: none; }
        
        .btn-pit { background: var(--pit-color); color: #000; }
        .btn-push { background: var(--push-color); }
        .btn-defend { background: var(--defend-color); }

        /* Active State for touch */
        .btn-action:active { transform: scale(0.96); opacity: 0.9; }

    </style>
</head>
<body>

    <!-- Header -->
    <div class="app-header">
        <div class="brand">GRID <span>STRATEGIST</span></div>
        <div class="track-info">
            <div>Circuit: <b>Monza 🇹</b></div>
            <div>Weather: <b>Sunny (28°C)</b></div>
        </div>
    </div>

    <!-- Scrollable Main Content -->
    <div class="main-container">
        
        <!-- Timing (Moved to Top for Mobile Priority) -->
        <div class="timing-section">
            <div class="panel-head">Live Classification</div>
            <div class="timing-list" id="timing-list"></div>
        </div>

        <!-- Commentary -->
        <div class="comm-section">
            <div class="panel-head">Race Control & Engineer Radio</div>
            <div class="comm-feed" id="feed">
                <div class="c-item">Mobil berada di grid. Strategi awal: Start Medium.</div>
            </div>
        </div>

    </div>

    <!-- Fixed Strategy Footer -->
    <div class="strategy-footer">
        <div class="footer-top-row">
            <div class="lap-counter">
                LAP <span id="lap-num">0</span><span class="lap-total">/53</span>
            </div>
            <div class="mode-selector">
                <select id="engine-mode" onchange="updateMode()">
                    <option value="save">SAVE MODE</option>
                    <option value="balanced" selected>BALANCED</option>
                    <option value="push">PUSH MODE</option>
                </select>
            </div>
        </div>

        <div class="action-buttons">
            <button class="btn-action btn-pit" onclick="commandPit()">
                BOX BOX
                <small>Ganti Ban</small>
            </button>
            <button class="btn-action btn-push" onclick="commandPush()">
                ATTACK
                <small>Overtake</small>
            </button>
            <button class="btn-action btn-defend" onclick="commandDefend()">
                DEFEND
                <small>Jaga Posisi</small>
            </button>
        </div>
    </div>

    <script>
        // --- DATA ---
        const teams = [
            { n: "Red Bull", c: "#0600EF" }, { n: "Mercedes", c: "#00D2BE" },
            { n: "Ferrari", c: "#FF1801" }, { n: "McLaren", c: "#FF8700" },
            { n: "Aston Martin", c: "#006F62" }, { n: "Alpine", c: "#0090FF" },
            { n: "Williams", c: "#005AFF" }, { n: "RB", c: "#1634CB" },
            { n: "Sauber", c: "#000000" }, { n: "Haas", c: "#B6BABD" },
            { n: "Grid FC", c: "#FFD700" }
        ];

        let drivers = [];
        let playerMode = "balanced"; 
        let lap = 0;
        let timer;

        function initDrivers() {
            drivers = [
                { n: "Verstappen", t: 0, p: 1, g: 0, fuel: 100, tire: 100, status: "Track" },
                { n: "Perez", t: 0, p: 2, g: 2.1, fuel: 100, tire: 100, status: "Track" },
                { n: "Hamilton", t: 1, p: 3, g: 5.4, fuel: 100, tire: 100, status: "Track" },
                { n: "Russell", t: 1, p: 4, g: 6.2, fuel: 100, tire: 100, status: "Track" },
                { n: "Leclerc", t: 2, p: 5, g: 8.5, fuel: 100, tire: 100, status: "Track" },
                { n: "Sainz", t: 2, p: 6, g: 9.1, fuel: 100, tire: 100, status: "Track" },
                { n: "Norris", t: 3, p: 7, g: 12.3, fuel: 100, tire: 100, status: "Track" },
                { n: "Piastri", t: 3, p: 8, g: 13.0, fuel: 100, tire: 100, status: "Track" },
                { n: "Alonso", t: 4, p: 9, g: 15.5, fuel: 100, tire: 100, status: "Track" },
                { n: "Stroll", t: 4, p: 10, g: 18.2, fuel: 100, tire: 100, status: "Track" },
                // PLAYER
                { n: "YOU (Player)", t: 10, p: 11, g: 19.5, fuel: 100, tire: 100, status: "Track", isP: true }, 
                { n: "Gasly", t: 5, p: 12, g: 20.1, fuel: 100, tire: 100, status: "Track" },
                { n: "Ocon", t: 5, p: 13, g: 21.5, fuel: 100, tire: 100, status: "Track" },
                { n: "Albon", t: 6, p: 14, g: 25.0, fuel: 100, tire: 100, status: "Track" },
                { n: "Teammate", t: 10, p: 15, g: 26.4, fuel: 100, tire: 100, status: "Track" },
                { n: "Tsunoda", t: 7, p: 16, g: 28.9, fuel: 100, tire: 100, status: "Track" },
                { n: "Ricciardo", t: 7, p: 17, g: 30.1, fuel: 100, tire: 100, status: "Track" },
                { n: "Bottas", t: 8, p: 18, g: 35.2, fuel: 100, tire: 100, status: "Track" },
                { n: "Zhou", t: 8, p: 19, g: 36.5, fuel: 100, tire: 100, status: "Track" },
                { n: "Hulkenberg", t: 9, p: 20, g: 40.0, fuel: 100, tire: 100, status: "Track" },
                { n: "Magnussen", t: 9, p: 21, g: 41.2, fuel: 100, tire: 100, status: "Track" },
                { n: "Colapinto", t: 6, p: 22, g: 45.0, fuel: 100, tire: 100, status: "Track" }
            ];
        }

        // --- RENDER ---
        function renderTiming() {
            const list = document.getElementById('timing-list');
            list.innerHTML = '';
            drivers.sort((a,b) => a.p - b.p);

            drivers.forEach(d => {
                const team = teams[d.t];
                const gapText = d.p === 1 ? "LEADER" : `+${d.g.toFixed(1)}s`;
                
                const row = document.createElement('div');
                row.className = `t-row ${d.isP ? 'player' : ''}`;
                
                let bars = "";
                if(d.isP) {
                    bars = `
                        <div class="resources">
                            <span>⛽</span><div class="res-bar"><div class="res-fill fill-fuel" style="width:${d.fuel}%"></div></div>
                            <span>🍥</span><div class="res-bar"><div class="res-fill fill-tire" style="width:${d.tire}%"></div></div>
                        </div>
                    `;
                }

                row.innerHTML = `
                    <div class="t-pos">${d.p}</div>
                    <div class="t-driver">
                        <div class="d-name">
                            <div class="team-dot" style="background:${team.c}"></div>
                            ${d.n}
                        </div>
                        ${bars}
                    </div>
                    <div class="t-gap"><span>${gapText}</span></div>
                `;
                list.appendChild(row);
            });
        }

        function addLog(text, type="normal") {
            const feed = document.getElementById('feed');
            const div = document.createElement('div');
            div.className = `c-item ${type}`;
            div.innerHTML = `<span class="c-lap">L${lap}</span> ${text}`;
            feed.prepend(div);
        }

        // --- STRATEGY COMMANDS ---
        function updateMode() {
            playerMode = document.getElementById('engine-mode').value;
            addLog(`Engine mode changed to: <b>${playerMode.toUpperCase()}</b>.`, "strat");
        }

        function commandPit() {
            const p = drivers.find(d => d.isP);
            if(p.status === "Track") {
                p.status = "PIT";
                p.tire = 100; 
                p.fuel -= 5; 
                addLog("COMMAND: Box Box! Masuk pit untuk ban baru.", "strat");
                setTimeout(() => {
                    if(p.status === "PIT") {
                        p.status = "Track";
                        p.g = 25.0; 
                        addLog("✅ Mobil keluar dari pit lane dengan ban fresh.");
                    }
                }, 4000);
            } else {
                addLog("⚠️ Driver sedang tidak di trek!", "danger");
            }
        }

        function commandPush() {
            addLog("COMMAND: Attack! Meningkatkan kecepatan maksimal.", "strat");
        }

        function commandDefend() {
            addLog("COMMAND: Defend! Fokus menjaga posisi.", "strat");
        }

        // --- SIMULATION LOGIC ---
        function simulateLap() {
            if(lap >= 53) { finishRace(); return; }
            lap++;
            document.getElementById('lap-num').innerText = lap;

            const player = drivers.find(d => d.isP);

            drivers.forEach(d => {
                if(d.status === "Track") {
                    let fuelBurn = 1.0;
                    let tireWear = 1.0;

                    if(d.isP) {
                        if(playerMode === "save") { fuelBurn = 0.5; tireWear = 0.5; }
                        if(playerMode === "push") { fuelBurn = 2.5; tireWear = 2.5; }
                    }

                    d.fuel -= fuelBurn;
                    d.tire -= tireWear;

                    let performance = 1.0;
                    if(d.tire < 20) performance = 0.7;
                    if(d.fuel <= 0) { 
                        d.status = "DNF"; 
                        addLog(` ${d.n} kehabisan bahan bakar!`, "danger"); 
                    }

                    if(d.status === "Track" && d.fuel > 0) {
                        let change = (Math.random() - 0.5) * 2 * performance;
                        if(d.isP && playerMode === "push") change += 0.8;
                        if(d.isP && playerMode === "save") change -= 0.3;
                        
                        d.g += change;
                        if(d.g < 0.5 && d.p !== 1) d.g = 0.5;
                    }
                }
            });

            if(Math.random() > 0.8) {
                const idx = Math.floor(Math.random() * (drivers.length - 1));
                const d1 = drivers[idx];
                const d2 = drivers[idx+1];
                if(d1.status === "Track" && d2.status === "Track") {
                    let tempP = d1.p; d1.p = d2.p; d2.p = tempP;
                    addLog(`⚔️ ${d2.n} menyalip ${d1.n}!`);
                }
            }

            renderTiming();
        }

        function finishRace() {
            clearInterval(timer);
            addLog("🏁 CHECKERED FLAG! Balapan Selesai.", "strat");
        }

        function startCountdown() {
            let count = 3;
            const intv = setInterval(() => {
                document.getElementById('lap-num').innerText = count;
                count--;
                if(count < 0) {
                    clearInterval(intv);
                    document.getElementById('lap-num').innerText = "0";
                    timer = setInterval(simulateLap, 1000);
                    addLog("🚩 LIGHTS OUT! BALAPAN DIMULAI!", "danger");
                }
            }, 1000);
        }

        // Init
        initDrivers();
        renderTiming();
        startCountdown();

    </script>
</body>
</html>
