<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Race Live - Grid Manager</title>
    <link href="https://fonts.googleapis.com/css2?family=Racing+Sans+One&family=Roboto+Mono:wght@400;500&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-dark: #0f0f0f;
            --panel-bg: #161616;
            --text-main: #e0e0e0;
            --accent: #ff1801;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }
        
        body {
            background-color: var(--bg-dark);
            color: var(--text-main);
            font-family: 'Roboto Mono', monospace; /* Font monospaced agar angka rapi */
            height: 100vh;
            display: flex;
            flex-direction: column;
            overflow: hidden; /* Mencegah scroll body utama */
        }

        /* --- HEADER (Sangat Tipis) --- */
        .race-header {
            background: #000;
            padding: 8px 15px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 2px solid var(--accent);
            height: 50px;
        }
        .race-title { font-family: 'Racing Sans One'; font-size: 16px; color: white; }
        .lap-counter { font-size: 14px; font-weight: bold; color: var(--accent); }

        /* --- MAIN LAYOUT (Split View) --- */
        .main-split {
            display: flex;
            flex: 1;
            overflow: hidden;
            height: calc(100vh - 90px); /* Sisa tinggi dikurangi header & footer */
        }

        /* --- KIRI: LIVE TIMING (Sempit) --- */
        .timing-col {
            width: 130px; /* Lebar tetap kecil */
            background: var(--panel-bg);
            border-right: 1px solid #333;
            overflow-y: auto;
            flex-shrink: 0;
        }
        
        .t-row {
            display: flex;
            align-items: center;
            padding: 6px 4px;
            border-bottom: 1px solid #222;
            font-size: 11px;
        }
        .t-row.player { background: rgba(255, 215, 0, 0.15); border-left: 3px solid gold; }
        
        .t-pos { width: 20px; text-align: center; color: #666; font-weight: bold; }
        .t-info { flex: 1; padding-left: 5px; overflow: hidden; }
        .t-name { color: white; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; display: block; }
        .t-gap { color: #888; font-size: 10px; }
        .t-team-dot { width: 6px; height: 6px; border-radius: 50%; display: inline-block; margin-right: 4px; }

        /* --- KANAN: COMMENTARY (Scrollable) --- */
        .comm-col {
            flex: 1;
            background: #0a0a0a;
            display: flex;
            flex-direction: column;
            position: relative;
        }
        
        .comm-header {
            padding: 8px 15px;
            background: #1a1a1a;
            font-size: 10px;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: #666;
            border-bottom: 1px solid #333;
        }

        .comm-feed {
            flex: 1;
            overflow-y: auto; /* Scroll hanya di area ini */
            padding: 15px;
            display: flex;
            flex-direction: column-reverse; /* Item baru di bawah */
        }

        .c-item {
            margin-bottom: 10px;
            font-size: 12px;
            line-height: 1.4;
            color: #ccc;
            border-left: 2px solid #333;
            padding-left: 10px;
        }
        .c-lap { color: var(--accent); font-weight: bold; margin-right: 5px; }
        .c-flag { color: yellow; margin-right: 5px; }

        /* --- FOOTER CONTROLS --- */
        .controls {
            height: 40px;
            background: #1a1a1a;
            border-top: 1px solid #333;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 15px;
        }
        .btn {
            background: #333; color: white; border: none;
            padding: 5px 15px; border-radius: 4px; font-size: 11px; cursor: pointer;
            font-family: 'Roboto Mono', monospace;
        }
        .btn-go { background: var(--accent); }
    </style>
</head>
<body>

    <!-- Header -->
    <div class="race-header">
        <div class="race-title">CANADIAN GP 🇨🇦</div>
        <div class="lap-counter">LAP <span id="lap-num">0</span>/70</div>
    </div>

    <!-- Split Content -->
    <div class="main-split">
        
        <!-- Kolom Kiri: Klasemen Sempit -->
        <div class="timing-col" id="timing-list">
            <!-- Diisi oleh JS -->
        </div>

        <!-- Kolom Kanan: Komentar -->
        <div class="comm-col">
            <div class="comm-header">Live Telemetry & Radio</div>
            <div class="comm-feed" id="comm-feed">
                <div class="c-item">Menunggu lampu start...</div>
            </div>
        </div>

    </div>

    <!-- Controls -->
    <div class="controls">
        <button class="btn" onclick="window.location.href='calendar.html'">EXIT</button>
        <button class="btn btn-go" id="toggle-btn" onclick="toggleSim()">START RACE</button>
    </div>

    <script>
        // --- DATA ---
        const teams = [
            { n: "Red Bull", c: "#0600EF" }, { n: "Mercedes", c: "#00D2BE" },
            { n: "Ferrari", c: "#FF1801" }, { n: "McLaren", c: "#FF8700" },
            { n: "Aston M.", c: "#006F62" }, { n: "Alpine", c: "#0090FF" },
            { n: "Williams", c: "#005AFF" }, { n: "RB", c: "#1634CB" },
            { n: "Sauber", c: "#52E252" }, { n: "Haas", c: "#B6BABD" },
            { n: "GRID FC", c: "#FFD700" } // Tim Pemain
        ];

        let drivers = [
            { p: 1, n: "Verstappen", t: 0, g: 0 }, { p: 2, n: "Perez", t: 0, g: 1.2 },
            { p: 3, n: "Hamilton", t: 1, g: 3.5 }, { p: 4, n: "Russell", t: 1, g: 4.1 },
            { p: 5, n: "Leclerc", t: 2, g: 6.8 }, { p: 6, n: "Sainz", t: 2, g: 7.2 },
            { p: 7, n: "Norris", t: 3, g: 9.5 }, { p: 8, n: "Piastri", t: 3, g: 10.1 },
            { p: 9, n: "Alonso", t: 4, g: 12.4 }, { p: 10, n: "Stroll", t: 4, g: 14.0 },
            { p: 11, n: "Gasly", t: 5, g: 16.2 }, { p: 12, n: "Ocon", t: 5, g: 17.5 },
            { p: 13, n: "Albon", t: 6, g: 20.1 }, { p: 14, n: "Colapinto", t: 6, g: 21.3 },
            { p: 15, n: "Tsunoda", t: 7, g: 24.5 }, { p: 16, n: "Lawson", t: 7, g: 25.8 },
            { p: 17, n: "Bottas", t: 8, g: 30.2 }, { p: 18, n: "Zhou", t: 8, g: 31.5 },
            { p: 19, n: "Hulkenberg", t: 9, g: 35.0 }, { p: 20, n: "Bearman", t: 9, g: 36.2 },
            // PLAYER
            { p: 12, n: "YOU", t: 10, g: 18.5 }, { p: 18, n: "Teammate", t: 10, g: 32.0 }
        ];

        let lap = 0;
        let running = false;
        let timer;

        const feed = document.getElementById('comm-feed');
        const tList = document.getElementById('timing-list');
        const lapNum = document.getElementById('lap-num');
        const btn = document.getElementById('toggle-btn');

        function render() {
            // Sort by position
            drivers.sort((a,b) => a.p - b.p);
            
            let html = '';
            drivers.forEach(d => {
                const isPlayer = d.t === 10;
                const gapTxt = d.p === 1 ? "LEADER" : `+${d.g.toFixed(1)}s`;
                
                html += `
                <div class="t-row ${isPlayer ? 'player' : ''}">
                    <div class="t-pos">${d.p}</div>
                    <div class="t-info">
                        <span class="t-team-dot" style="background:${teams[d.t].c}"></span>
                        <span class="t-name">${d.n}</span>
                        <span class="t-gap">${gapTxt}</span>
                    </div>
                </div>`;
            });
            tList.innerHTML = html;
        }

        function log(text, flag=false) {
            const div = document.createElement('div');
            div.className = 'c-item';
            div.innerHTML = `<span class="c-lap">L${lap}</span> ${flag ? '<span class="c-flag">🚩</span>' : ''} ${text}`;
            feed.prepend(div);
            if(feed.children.length > 30) feed.lastChild.remove();
        }

        function update() {
            if(lap >= 70) {
                clearInterval(timer);
                running = false;
                btn.innerText = "FINISH";
                log("BALAPAN SELESAI! 🏁", true);
                return;
            }

            lap++;
            lapNum.innerText = lap;

            // Simulasi Perubahan Gap & Posisi
            drivers.forEach(d => {
                // Acak perubahan gap
                d.g += (Math.random() - 0.5) * 1.5;
                if(d.g < 0.5 && d.p !== 1) d.g = 0.5;
            });

            // Simulasi Overtake (Acak swap posisi berdekatan)
            if(Math.random() > 0.7) {
                const idx = Math.floor(Math.random() * 20);
                let d1 = drivers[idx];
                let d2 = drivers[idx+1];
                
                // Logika swap sederhana
                let tempP = d1.p; d1.p = d2.p; d2.p = tempP;
                log(`${d2.n} menyalip ${d1.n}!`);
            }

            // Event Random
            if(Math.random() > 0.9) log("Sector 2 fastest by " + drivers[0].n);
            if(Math.random() < 0.05) log("Yellow Flag Turn 4!", true);

            render();
        }

        function toggleSim() {
            if(running) {
                clearInterval(timer);
                running = false;
                btn.innerText = "RESUME";
            } else {
                if(lap===0) log("LIGHTS OUT! 🟢");
                timer = setInterval(update, 1000); // Kecepatan simulasi
                running = true;
                btn.innerText = "PAUSE";
            }
        }

        // Init
        render();
    </script>
</body>
</html>
