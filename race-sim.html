<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Race Sim Compact</title>
    <link href="https://fonts.googleapis.com/css2?family=Racing+Sans+One&family=Roboto:wght@400;500;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-dark: #0f0f0f;
            --bg-panel: #1a1a1a;
            --border: #333;
            --text-main: #e0e0e0;
            --text-dim: #888;
            --accent: #ff1801;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }
        
        body {
            background-color: var(--bg-dark);
            color: var(--text-main);
            font-family: 'Roboto', sans-serif;
            height: 100vh;
            display: flex;
            flex-direction: column;
            overflow: hidden; /* Prevent body scroll */
        }

        /* --- HEADER --- */
        .header {
            background: var(--bg-panel);
            padding: 10px 15px;
            border-bottom: 2px solid var(--accent);
            display: flex;
            justify-content: space-between;
            align-items: center;
            z-index: 10;
        }
        .race-title { font-family: 'Racing Sans One'; font-size: 18px; }
        .lap-counter { font-weight: bold; font-size: 16px; }
        .lap-counter span { color: var(--accent); }

        /* --- MAIN LAYOUT --- */
        .main-grid {
            display: grid;
            grid-template-columns: 1fr 320px; /* Comment takes rest, Timing fixed width */
            flex: 1;
            height: calc(100vh - 100px); /* Adjust for header/footer */
        }

        /* Mobile Responsive */
        @media (max-width: 768px) {
            .main-grid { grid-template-columns: 1fr; grid-template-rows: 1fr 1fr; }
        }

        /* --- LEFT: COMMENTARY (Scrollable) --- */
        .comm-section {
            border-right: 1px solid var(--border);
            display: flex;
            flex-direction: column;
            background: #121212;
        }
        .panel-head {
            padding: 8px 15px;
            background: #222;
            font-size: 11px;
            font-weight: bold;
            text-transform: uppercase;
            color: var(--text-dim);
            border-bottom: 1px solid var(--border);
        }
        .comm-feed {
            flex: 1;
            overflow-y: auto; /* Scrollable */
            padding: 10px;
            display: flex;
            flex-direction: column-reverse; /* Newest at bottom */
        }
        .c-item {
            font-size: 13px;
            margin-bottom: 8px;
            padding-left: 10px;
            border-left: 2px solid #333;
            line-height: 1.3;
        }
        .c-lap { color: var(--accent); font-weight: bold; font-size: 11px; margin-right: 5px; }

        /* --- RIGHT: TIMING (Compact) --- */
        .timing-section {
            background: var(--bg-panel);
            overflow-y: auto;
        }
        .t-row {
            display: flex;
            align-items: center;
            padding: 6px 10px;
            border-bottom: 1px solid #222;
            font-size: 13px;
            transition: background 0.2s;
        }
        .t-row.player { background: rgba(255, 215, 0, 0.1); border-left: 3px solid gold; }
        
        .t-pos { width: 25px; font-weight: bold; color: var(--text-dim); font-size: 12px; }
        .t-info { flex: 1; display: flex; align-items: center; gap: 6px; overflow: hidden; }
        
        /* Color Stripe & Name in one line */
        .team-dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }
        .d-name { white-space: nowrap; overflow: hidden; text-overflow: ellipsis; font-weight: 500; }
        
        /* Gap on the right */
        .t-gap { 
            font-family: monospace; 
            font-size: 12px; 
            color: var(--text-dim); 
            text-align: right;
            min-width: 60px;
        }
        .gap-val { color: #fff; }

        /* --- FOOTER CONTROLS --- */
        .controls {
            height: 50px;
            background: var(--bg-panel);
            border-top: 1px solid var(--border);
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 15px;
        }
        .btn {
            padding: 8px 24px;
            border-radius: 4px;
            border: none;
            font-weight: bold;
            cursor: pointer;
            font-size: 12px;
            text-transform: uppercase;
        }
        .btn-go { background: var(--accent); color: white; }
        .btn-stop { background: #333; color: white; }

    </style>
</head>
<body>

    <!-- Header -->
    <div class="header">
        <div class="race-title">🇨🇦 CANADIAN GP</div>
        <div class="lap-counter">LAP <span id="lap-num">0</span>/70</div>
    </div>

    <!-- Main Grid -->
    <div class="main-grid">
        
        <!-- Left: Commentary -->
        <div class="comm-section">
            <div class="panel-head">Live Commentary</div>
            <div class="comm-feed" id="feed">
                <div class="c-item">Ready to start...</div>
            </div>
        </div>

        <!-- Right: Timing -->
        <div class="timing-section">
            <div class="panel-head">Live Classification</div>
            <div id="timing-list">
                <!-- JS will populate this -->
            </div>
        </div>
    </div>

    <!-- Controls -->
    <div class="controls">
        <button class="btn btn-stop" onclick="resetSim()">Reset</button>
        <button class="btn btn-go" id="start-btn" onclick="toggleSim()">START RACE</button>
    </div>

    <script>
        // --- DATA ---
        const teams = [
            { n: "Red Bull", c: "#0600EF" }, { n: "Mercedes", c: "#00D2BE" },
            { n: "Ferrari", c: "#FF1801" }, { n: "McLaren", c: "#FF8700" },
            { n: "Aston Martin", c: "#006F62" }, { n: "Alpine", c: "#0090FF" },
            { n: "Williams", c: "#005AFF" }, { n: "RB", c: "#1634CB" },
            { n: "Sauber", c: "#000000" }, { n: "Haas", c: "#B6BABD" },
            { n: "Grid FC", c: "#FFD700" } // Player Team
        ];

        // Initial Grid (22 Drivers)
        let drivers = [
            { n: "Verstappen", t: 0, p: 1, g: 0 }, { n: "Perez", t: 0, p: 2, g: 2.1 },
            { n: "Hamilton", t: 1, p: 3, g: 5.4 }, { n: "Russell", t: 1, p: 4, g: 6.2 },
            { n: "Leclerc", t: 2, p: 5, g: 8.5 }, { n: "Sainz", t: 2, p: 6, g: 9.1 },
            { n: "Norris", t: 3, p: 7, g: 12.3 }, { n: "Piastri", t: 3, p: 8, g: 13.0 },
            { n: "Alonso", t: 4, p: 9, g: 15.5 }, { n: "Stroll", t: 4, p: 10, g: 18.2 },
            // PLAYER START P11
            { n: "YOU (Player)", t: 10, p: 11, g: 19.5, isP: true }, 
            { n: "Gasly", t: 5, p: 12, g: 20.1 }, { n: "Ocon", t: 5, p: 13, g: 21.5 },
            { n: "Albon", t: 6, p: 14, g: 25.0 }, { n: "Teammate", t: 10, p: 15, g: 26.4, isP: false },
            { n: "Tsunoda", t: 7, p: 16, g: 28.9 }, { n: "Ricciardo", t: 7, p: 17, g: 30.1 },
            { n: "Bottas", t: 8, p: 18, g: 35.2 }, { n: "Zhou", t: 8, p: 19, g: 36.5 },
            { n: "Hulkenberg", t: 9, p: 20, g: 40.0 }, { n: "Magnussen", t: 9, p: 21, g: 41.2 },
            { n: "Colapinto", t: 6, p: 22, g: 45.0 }
        ];

        let lap = 0;
        let running = false;
        let timer;

        // --- RENDER FUNCTIONS ---
        function renderTiming() {
            const list = document.getElementById('timing-list');
            list.innerHTML = '';
            
            // Sort by position
            drivers.sort((a,b) => a.p - b.p);

            drivers.forEach(d => {
                const team = teams[d.t];
                const gapText = d.p === 1 ? "LEADER" : `+${d.g.toFixed(1)}s`;
                
                const row = document.createElement('div');
                row.className = `t-row ${d.isP ? 'player' : ''}`;
                row.innerHTML = `
                    <div class="t-pos">${d.p}</div>
                    <div class="t-info">
                        <div class="team-dot" style="background:${team.c}"></div>
                        <div class="d-name">${d.n}</div>
                    </div>
                    <div class="t-gap"><span class="gap-val">${gapText}</span></div>
                `;
                list.appendChild(row);
            });
        }

        function addLog(text) {
            const feed = document.getElementById('feed');
            const div = document.createElement('div');
            div.className = 'c-item';
            div.innerHTML = `<span class="c-lap">L${lap}</span> ${text}`;
            feed.prepend(div); // Add to top
        }

        // --- SIMULATION LOGIC ---
        function simulateLap() {
            if(lap >= 70) { finishRace(); return; }
            lap++;
            document.getElementById('lap-num').innerText = lap;

            // 1. Update Gaps randomly
            drivers.forEach(d => {
                if(Math.random() > 0.5) d.g += (Math.random() - 0.5) * 1.5;
                if(d.g < 0.5 && d.p !== 1) d.g = 0.5;
            });

            // 2. Random Overtake Logic
            // Pick a random index and swap with neighbor
            const idx = Math.floor(Math.random() * (drivers.length - 1));
            const d1 = drivers[idx];
            const d2 = drivers[idx+1];
            
            // Simple swap logic for demo
            if(Math.random() > 0.7) {
                let tempP = d1.p; d1.p = d2.p; d2.p = tempP;
                addLog(`<b>${d2.n}</b> overtakes ${d1.n} for P${d2.p}!`);
            }

            // 3. Player Event
            if(Math.random() > 0.8) {
                const msgs = ["You set fastest lap!", "Engine mode: Push.", "Traffic ahead."];
                addLog(msgs[Math.floor(Math.random()*msgs.length)]);
            }

            renderTiming();
        }

        function toggleSim() {
            const btn = document.getElementById('start-btn');
            if(running) {
                clearInterval(timer);
                running = false;
                btn.innerText = "RESUME";
                btn.style.background = "#333";
            } else {
                if(lap === 0) addLog("LIGHTS OUT! RACE STARTED!");
                running = true;
                btn.innerText = "PAUSE";
                btn.style.background = "#ff1801";
                timer = setInterval(simulateLap, 1000); // 1 sec = 1 lap
            }
        }

        function resetSim() {
            clearInterval(timer);
            running = false;
            lap = 0;
            document.getElementById('lap-num').innerText = "0";
            document.getElementById('start-btn').innerText = "START RACE";
            document.getElementById('feed').innerHTML = '<div class="c-item">Ready to start...</div>';
            // Reset positions roughly
            drivers.forEach((d, i) => { d.p = i + 1; d.g = i * 2.5; });
            renderTiming();
        }

        function finishRace() {
            clearInterval(timer);
            running = false;
            addLog("🏁 CHECKERED FLAG! RACE FINISHED.");
            document.getElementById('start-btn').innerText = "FINISHED";
        }

        // Init
        renderTiming();
    </script>
</body>
</html>
