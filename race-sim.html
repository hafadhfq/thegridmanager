<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Live Race Dashboard</title>
    <link href="https://fonts.googleapis.com/css2?family=Racing+Sans+One&family=Roboto:wght@400;500;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-dark: #0f0f0f;
            --bg-panel: #1a1a1a;
            --border: #333;
            --text-main: #e0e0e0;
            --accent: #ff1801;
            --safe-bottom: env(safe-area-inset-bottom, 20px);
        }

        * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
        
        body {
            background-color: var(--bg-dark);
            color: var(--text-main);
            font-family: 'Roboto', sans-serif;
            height: 100vh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        /* --- HEADER --- */
        .app-header {
            background: var(--bg-panel);
            padding: 12px 20px;
            border-bottom: 2px solid var(--accent);
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-shrink: 0;
            z-index: 10;
        }
        .brand { font-family: 'Racing Sans One'; font-size: 18px; color: white; font-style: italic; }
        .brand span { color: var(--accent); }
        .race-timer { 
            font-family: monospace; 
            font-size: 16px; 
            color: var(--accent); 
            font-weight: bold;
            background: #222;
            padding: 4px 10px;
            border-radius: 4px;
        }

        /* --- MAIN GRID --- */
        .main-grid {
            display: flex;
            flex: 1;
            overflow: hidden;
        }

        /* LEFT: NARROW CLASSIFICATION */
        .timing-section {
            width: 160px; /* Sangat sempit sesuai request */
            background: var(--bg-panel);
            border-right: 1px solid var(--border);
            display: flex;
            flex-direction: column;
            flex-shrink: 0;
        }
        .panel-head {
            padding: 8px 10px;
            background: #222;
            font-size: 9px;
            font-weight: bold;
            text-transform: uppercase;
            color: var(--accent);
            border-bottom: 1px solid var(--border);
            letter-spacing: 1px;
        }
        .timing-list { 
            flex: 1; 
            overflow-y: auto; 
            scrollbar-width: thin;
            scrollbar-color: #333 transparent;
        }
        
        .t-row {
            display: flex;
            align-items: center;
            padding: 8px 6px;
            border-bottom: 1px solid #222;
            font-size: 11px;
        }
        .t-row.player { background: rgba(255, 215, 0, 0.1); border-left: 2px solid gold; }
        
        .t-pos { width: 18px; font-weight: bold; color: #666; font-size: 10px; text-align: center; }
        .t-info { flex: 1; display: flex; flex-direction: column; gap: 3px; min-width: 0; }
        
        .d-name-short { 
            font-weight: 700; 
            color: white; 
            font-size: 11px; 
            white-space: nowrap; 
            overflow: hidden; 
            text-overflow: ellipsis;
        }
        
        .team-tyre-row { display: flex; align-items: center; gap: 4px; }
        .team-dot { width: 3px; height: 10px; border-radius: 1px; flex-shrink: 0; }
        
        .tyre-badge {
            width: 14px; height: 14px;
            border-radius: 3px;
            font-size: 7px;
            font-weight: bold;
            display: flex; align-items: center; justify-content: center;
            color: black; flex-shrink: 0;
        }
        .tyre-S { background: #ff1801; color: white; }
        .tyre-M { background: #ffe600; }
        .tyre-H { background: #ffffff; }
        .tyre-I { background: #00ff00; }
        .tyre-W { background: #0055ff; color: white; }

        .t-gap { 
            font-family: monospace; 
            font-size: 9px; 
            color: #888; 
            text-align: right;
            min-width: 35px;
            white-space: nowrap;
        }

        /* RIGHT: WIDE COMMENTARY */
        .comm-section {
            flex: 1;
            display: flex;
            flex-direction: column;
            background: #121212;
        }
        .comm-feed {
            flex: 1;
            overflow-y: auto;
            padding: 15px;
            display: flex;
            flex-direction: column-reverse;
        }
        .c-item {
            margin-bottom: 10px;
            padding: 10px;
            background: #1a1a1a;
            border-radius: 6px;
            border-left: 3px solid #333;
            font-size: 13px;
            line-height: 1.4;
            animation: slideIn 0.3s ease;
        }
        .c-item.strat { border-left-color: #00d2be; background: rgba(0, 210, 190, 0.1); }
        .c-item.danger { border-left-color: red; color: #ffaaaa; }
        .c-lap { font-weight: bold; color: #666; font-size: 10px; margin-right: 6px; }

        /* --- FOOTER NAVIGATION --- */
        .nav-footer {
            height: 60px;
            background: var(--bg-panel);
            border-top: 1px solid var(--border);
            display: flex;
            justify-content: space-around;
            align-items: center;
            flex-shrink: 0;
            padding-bottom: var(--safe-bottom);
            z-index: 100;
        }
        .nav-btn {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 4px;
            color: #666;
            text-decoration: none;
            font-size: 10px;
            cursor: pointer;
            transition: 0.2s;
        }
        .nav-btn.active { color: var(--accent); }
        .nav-icon { font-size: 20px; }

        @keyframes slideIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        /* Mobile Adjustments */
        @media (max-width: 480px) {
            .timing-section { width: 130px; }
            .d-name-short { font-size: 10px; }
            .t-gap { font-size: 8px; min-width: 30px; }
        }
    </style>
</head>
<body>

    <!-- Header -->
    <div class="app-header">
        <div class="brand">GRID <span>LIVE</span></div>
        <div class="race-timer" id="race-timer">10:00</div>
    </div>

    <!-- Main Grid -->
    <div class="main-grid">
        
        <!-- Left: Narrow Classification -->
        <div class="timing-section">
            <div class="panel-head">Posisi</div>
            <div class="timing-list" id="timing-list"></div>
        </div>

        <!-- Right: Wide Commentary -->
        <div class="comm-section">
            <div class="panel-head">Race Control & Engineer Radio</div>
            <div class="comm-feed" id="feed">
                <div class="c-item">Sistem siap. Balapan akan dimulai secara otomatis.</div>
            </div>
        </div>
    </div>

    <!-- Footer Navigation -->
    <div class="nav-footer">
        <a class="nav-btn" onclick="alert('Kembali ke Dashboard')">
            <span class="nav-icon">🏠</span>
            <span>Dashboard</span>
        </a>
        <a class="nav-btn active">
            <span class="nav-icon"></span>
            <span>Live Race</span>
        </a>
        <a class="nav-btn" onclick="alert('Membuka Halaman Tim')">
            <span class="nav-icon">👥</span>
            <span>Tim Saya</span>
        </a>
        <a class="nav-btn" onclick="alert('Membuka Pengaturan')">
            <span class="nav-icon">⚙️</span>
            <span>Pengaturan</span>
        </a>
    </div>

    <script>
        // --- DATA ---
        const teams = [
            { n: "Red Bull", c: "#0600EF" }, { n: "Mercedes", c: "#00D2BE" },
            { n: "Ferrari", c: "#FF1801" }, { n: "McLaren", c: "#FF8700" },
            { n: "Aston Martin", c: "#006F62" }, { n: "Alpine", c: "#0090FF" },
            { n: "Williams", c: "#005AFF" }, { n: "RB", c: "#1634CB" },
            { n: "Sauber", c: "#000000" }, { n: "Haas", c: "#B6BABD" },
            { n: "Grid FC", c: "#FFD700" }
        ];

        let drivers = [];
        let lap = 0;
        let timer;
        let timeLeft = 600; // 10 menit dalam detik
        let showGapToLeader = true; // Toggle untuk gap/interval
        let toggleTimer;

        function initDrivers() {
            drivers = [
                { n: "Verstappen", short: "VER", t: 0, p: 1, g: 0, tyre: "M", status: "Track" },
                { n: "Perez", short: "PER", t: 0, p: 2, g: 2.1, tyre: "M", status: "Track" },
                { n: "Hamilton", short: "HAM", t: 1, p: 3, g: 5.4, tyre: "H", status: "Track" },
                { n: "Russell", short: "RUS", t: 1, p: 4, g: 6.2, tyre: "H", status: "Track" },
                { n: "Leclerc", short: "LEC", t: 2, p: 5, g: 8.5, tyre: "S", status: "Track" },
                { n: "Sainz", short: "SAI", t: 2, p: 6, g: 9.1, tyre: "S", status: "Track" },
                { n: "Norris", short: "NOR", t: 3, p: 7, g: 12.3, tyre: "M", status: "Track" },
                { n: "Piastri", short: "PIA", t: 3, p: 8, g: 13.0, tyre: "M", status: "Track" },
                { n: "Alonso", short: "ALO", t: 4, p: 9, g: 15.5, tyre: "H", status: "Track" },
                { n: "Stroll", short: "STR", t: 4, p: 10, g: 18.2, tyre: "H", status: "Track" },
                // PLAYER
                { n: "Andi Pratama", short: "PRA", t: 10, p: 11, g: 19.5, tyre: "S", status: "Track", isP: true }, 
                { n: "Gasly", short: "GAS", t: 5, p: 12, g: 20.1, tyre: "M", status: "Track" },
                { n: "Ocon", short: "OCO", t: 5, p: 13, g: 21.5, tyre: "M", status: "Track" },
                { n: "Albon", short: "ALB", t: 6, p: 14, g: 25.0, tyre: "H", status: "Track" },
                { n: "Teammate", short: "TEA", t: 10, p: 15, g: 26.4, tyre: "S", status: "Track" },
                { n: "Tsunoda", short: "TSU", t: 7, p: 16, g: 28.9, tyre: "M", status: "Track" },
                { n: "Ricciardo", short: "RIC", t: 7, p: 17, g: 30.1, tyre: "M", status: "Track" },
                { n: "Bottas", short: "BOT", t: 8, p: 18, g: 35.2, tyre: "H", status: "Track" },
                { n: "Zhou", short: "ZHO", t: 8, p: 19, g: 36.5, tyre: "H", status: "Track" },
                { n: "Hulkenberg", short: "HUL", t: 9, p: 20, g: 40.0, tyre: "M", status: "Track" },
                { n: "Magnussen", short: "MAG", t: 9, p: 21, g: 41.2, tyre: "M", status: "Track" },
                { n: "Colapinto", short: "COL", t: 6, p: 22, g: 45.0, tyre: "H", status: "Track" }
            ];
        }

        // --- RENDER ---
        function renderTiming() {
            const list = document.getElementById('timing-list');
            list.innerHTML = '';
            drivers.sort((a,b) => a.p - b.p);

            drivers.forEach(d => {
                const team = teams[d.t];
                
                // Logika Bergantian Gap / Interval
                let gapText = "";
                if (d.p === 1) {
                    gapText = "LEADER";
                } else if (showGapToLeader) {
                    gapText = `+${d.g.toFixed(1)}s`;
                } else {
                    // Cari driver di posisi sebelumnya untuk interval
                    const prevDriver = drivers.find(x => x.p === d.p - 1);
                    if (prevDriver) {
                        const interval = d.g - prevDriver.g;
                        gapText = `+${interval.toFixed(1)}s`;
                    } else {
                        gapText = `+${d.g.toFixed(1)}s`;
                    }
                }

                const row = document.createElement('div');
                row.className = `t-row ${d.isP ? 'player' : ''}`;
                
                row.innerHTML = `
                    <div class="t-pos">${d.p}</div>
                    <div class="t-info">
                        <div class="d-name-short">${d.short}</div>
                        <div class="team-tyre-row">
                            <div class="team-dot" style="background:${team.c}"></div>
                            <div class="tyre-badge tyre-${d.tyre}">${d.tyre}</div>
                        </div>
                    </div>
                    <div class="t-gap">${gapText}</div>
                `;
                list.appendChild(row);
            });
        }

        function addLog(text, type="normal") {
            const feed = document.getElementById('feed');
            const div = document.createElement('div');
            div.className = `c-item ${type}`;
            div.innerHTML = `<span class="c-lap">L${lap}</span> ${text}`;
            feed.prepend(div);
        }

        // --- SIMULATION LOGIC ---
        function simulateLap() {
            if(timeLeft <= 0) { finishRace(); return; }
            
            // Simulasi 1 lap per detik (dipercepat agar pas 10 menit)
            lap++;
            
            drivers.forEach(d => {
                if(d.status === "Track") {
                    d.g += (Math.random() - 0.5) * 1.5;
                    if(d.g < 0.5 && d.p !== 1) d.g = 0.5;
                    
                    // Random Pit Stop
                    if(Math.random() > 0.98) {
                        d.status = "PIT";
                        d.tyre = "M";
                        addLog(`${d.n} masuk pit untuk ganti ban Medium!`, "strat");
                        setTimeout(() => {
                            if(d.status === "PIT") {
                                d.status = "Track";
                                d.g += 20;
                                addLog(`${d.n} keluar dari pit lane.`, "strat");
                            }
                        }, 3000);
                    }
                }
            });

            // Random Overtake
            if(Math.random() > 0.7) {
                const idx = Math.floor(Math.random() * (drivers.length - 1));
                const d1 = drivers[idx];
                const d2 = drivers[idx+1];
                if(d1.status === "Track" && d2.status === "Track") {
                    let tempP = d1.p; d1.p = d2.p; d2.p = tempP;
                    addLog(`⚔️ ${d2.n} menyalip ${d1.n}!`);
                }
            }

            renderTiming();
        }

        function updateTimer() {
            timeLeft--;
            const m = Math.floor(timeLeft / 60).toString().padStart(2, '0');
            const s = (timeLeft % 60).toString().padStart(2, '0');
            document.getElementById('race-timer').innerText = `${m}:${s}`;
            
            if(timeLeft <= 0) finishRace();
        }

        function toggleGapDisplay() {
            showGapToLeader = !showGapToLeader;
            renderTiming();
        }

        function finishRace() {
            clearInterval(timer);
            clearInterval(toggleTimer);
            addLog("🏁 CHECKERED FLAG! Balapan Selesai.", "danger");
            document.getElementById('race-timer').innerText = "FINISH";
        }

        function startAutoRace() {
            addLog(" LIGHTS OUT! BALAPAN DIMULAI!", "danger");
            
            // Timer balapan utama (update tiap detik)
            timer = setInterval(() => {
                simulateLap();
                updateTimer();
            }, 1000);

            // Timer toggle gap/interval (tiap 60 detik)
            toggleTimer = setInterval(toggleGapDisplay, 60000);
        }

        // Init
        initDrivers();
        renderTiming();
        
        // Auto start setelah 3 detik countdown
        setTimeout(startAutoRace, 3000);

    </script>
</body>
</html>
