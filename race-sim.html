<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Race Live - Grid Manager</title>
    <link href="https://fonts.googleapis.com/css2?family=Racing+Sans+One&family=Roboto:wght@400;500;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --red-bull: #0600EF; --mercedes: #00D2BE; --ferrari: #FF1801;
            --mclaren: #FF8700; --aston: #006F62; --alpine: #0090FF;
            --williams: #005AFF; --rb: #1634CB; --audi: #C3002F;
            --haas: #B6BABD; --player: #FFD700;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }
        
        body {
            background-color: #0f0f0f;
            color: #e0e0e0;
            font-family: 'Roboto', sans-serif;
            height: 100vh;
            display: flex;
            flex-direction: column;
            overflow: hidden; /* Prevent body scroll */
        }

        /* --- HEADER --- */
        .race-header {
            background: #1a1a1a;
            padding: 8px 15px;
            border-bottom: 2px solid #ff1801;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-shrink: 0;
        }
        .race-info h1 { font-family: 'Racing Sans One'; font-size: 16px; color: white; line-height: 1; }
        .race-info span { font-size: 10px; color: #888; }
        .lap-box { text-align: right; }
        .lap-count { font-family: 'Racing Sans One'; font-size: 20px; color: #fff; }

        /* --- SPLIT LAYOUT --- */
        .sim-container {
            display: flex;
            flex: 1;
            overflow: hidden;
        }

        /* LEFT: COMMENTARY (Scrollable) */
        .comm-panel {
            width: 40%;
            background: #121212;
            border-right: 1px solid #333;
            display: flex;
            flex-direction: column;
        }
        .panel-title {
            padding: 8px 10px;
            background: #1a1a1a;
            font-weight: bold;
            font-size: 10px;
            color: #888;
            border-bottom: 1px solid #333;
            text-transform: uppercase;
        }
        .comm-feed {
            flex: 1;
            overflow-y: auto;
            padding: 10px;
            font-size: 11px;
            line-height: 1.4;
        }
        .comm-item {
            margin-bottom: 8px;
            padding-left: 8px;
            border-left: 2px solid #333;
            animation: fadeIn 0.3s ease;
        }
        .comm-lap { color: #ff1801; font-weight: bold; margin-right: 4px; }

        /* RIGHT: TIMING (Scrollable) */
        .timing-panel {
            width: 60%;
            background: #0f0f0f;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
        }
        
        .timing-row {
            display: flex;
            align-items: center;
            padding: 6px 10px;
            border-bottom: 1px solid #222;
            height: 36px;
            transition: background 0.2s;
        }
        .timing-row.highlight { background: rgba(255, 215, 0, 0.15); border-left: 3px solid var(--player); }
        
        .t-pos { width: 25px; font-weight: bold; color: #666; font-size: 12px; }
        .t-driver-info { flex: 1; display: flex; align-items: center; gap: 6px; overflow: hidden; }
        .team-dot { width: 6px; height: 6px; border-radius: 50%; flex-shrink: 0; }
        .d-name { font-size: 12px; color: white; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        
        .t-gap { 
            width: 60px; 
            text-align: right; 
            font-size: 11px; 
            color: #aaa; 
            font-family: monospace; 
            font-weight: bold;
        }

        /* --- CONTROLS --- */
        .controls-bar {
            background: #1a1a1a;
            padding: 10px;
            border-top: 1px solid #333;
            display: flex;
            gap: 10px;
            justify-content: center;
            flex-shrink: 0;
        }
        .btn {
            padding: 8px 16px;
            border-radius: 4px;
            border: none;
            font-weight: bold;
            cursor: pointer;
            font-size: 11px;
            text-transform: uppercase;
        }
        .btn-start { background: #00ff00; color: black; }
        .btn-pause { background: #ff1801; color: white; }
        .btn-menu { background: #333; color: white; }

        @keyframes fadeIn { from { opacity: 0; transform: translateX(-5px); } to { opacity: 1; transform: translateX(0); } }
    </style>
</head>
<body>

    <!-- Header -->
    <div class="race-header">
        <div class="race-info">
            <h1>CANADIAN GP 🇨🇦</h1>
            <span>Gilles Villeneuve • Dry</span>
        </div>
        <div class="lap-box">
            <div class="lap-count"><span id="lap-display">0</span>/70</div>
        </div>
    </div>

    <!-- Main Content -->
    <div class="sim-container">
        <!-- Commentary -->
        <div class="comm-panel">
            <div class="panel-title">Live Feed</div>
            <div class="comm-feed" id="comm-feed">
                <div class="comm-item">Ready for lights out...</div>
            </div>
        </div>

        <!-- Timing -->
        <div class="timing-panel">
            <div class="panel-title">Standings</div>
            <div id="timing-list">
                <!-- Rows generated by JS -->
            </div>
        </div>
    </div>

    <!-- Controls -->
    <div class="controls-bar">
        <button class="btn btn-menu" onclick="window.location.href='calendar.html'">Exit</button>
        <button class="btn btn-start" id="action-btn" onclick="toggleRace()">Start Race</button>
    </div>

    <script>
        // --- DATA 2026 GRID ---
        const teams = [
            { name: "Red Bull", color: "var(--red-bull)" },
            { name: "Mercedes", color: "var(--mercedes)" },
            { name: "Ferrari", color: "var(--ferrari)" },
            { name: "McLaren", color: "var(--mclaren)" },
            { name: "Aston Martin", color: "var(--aston)" },
            { name: "Alpine", color: "var(--alpine)" },
            { name: "Williams", color: "var(--williams)" },
            { name: "RB", color: "var(--rb)" },
            { name: "Audi", color: "var(--audi)" }, // Sauber rebranded
            { name: "Haas", color: "var(--haas)" },
            { name: "Grid FC", color: "var(--player)" } // Player Team
        ];

        // 22 Drivers
        let drivers = [
            { id: 1, name: "Verstappen", teamIdx: 0, pos: 1, gap: 0, status: "Track" },
            { id: 2, name: "Hadjar", teamIdx: 0, pos: 2, gap: 1.2, status: "Track" },
            { id: 3, name: "Antonelli", teamIdx: 1, pos: 3, gap: 3.5, status: "Track" },
            { id: 4, name: "Russell", teamIdx: 1, pos: 4, gap: 4.1, status: "Track" },
            { id: 5, name: "Leclerc", teamIdx: 2, pos: 5, gap: 5.8, status: "Track" },
            { id: 6, name: "Hamilton", teamIdx: 2, pos: 6, gap: 6.2, status: "Track" },
            { id: 7, name: "Norris", teamIdx: 3, pos: 7, gap: 8.5, status: "Track" },
            { id: 8, name: "Piastri", teamIdx: 3, pos: 8, gap: 9.0, status: "Track" },
            { id: 9, name: "Alonso", teamIdx: 4, pos: 9, gap: 12.1, status: "Track" },
            { id: 10, name: "Stroll", teamIdx: 4, pos: 10, gap: 14.5, status: "Track" },
            { id: 11, name: "Gasly", teamIdx: 5, pos: 11, gap: 16.2, status: "Track" },
            { id: 12, name: "Doohan", teamIdx: 5, pos: 12, gap: 18.0, status: "Track" },
            { id: 13, name: "Albon", teamIdx: 6, pos: 13, gap: 22.5, status: "Track" },
            { id: 14, name: "Sargeant", teamIdx: 6, pos: 14, gap: 24.1, status: "Track" },
            { id: 15, name: "Tsunoda", teamIdx: 7, pos: 15, gap: 28.9, status: "Track" },
            { id: 16, name: "Lawson", teamIdx: 7, pos: 16, gap: 30.2, status: "Track" },
            { id: 17, name: "Hulkenberg", teamIdx: 8, pos: 17, gap: 35.5, status: "Track" },
            { id: 18, name: "Bortoleto", teamIdx: 8, pos: 18, gap: 38.1, status: "Track" },
            { id: 19, name: "Bearman", teamIdx: 9, pos: 19, gap: 42.0, status: "Track" },
            { id: 20, name: "Ocon", teamIdx: 9, pos: 20, gap: 43.5, status: "Track" },
            // PLAYER
            { id: 21, name: "YOU (Player)", teamIdx: 10, pos: 14, gap: 25.0, status: "Track" },
            { id: 22, name: "Rookie", teamIdx: 10, pos: 18, gap: 39.0, status: "Track" }
        ];

        let currentLap = 0;
        let isRunning = false;
        let intervalId;
        const totalLaps = 70;

        const feed = document.getElementById('comm-feed');
        const timingList = document.getElementById('timing-list');
        const lapDisplay = document.getElementById('lap-display');
        const actionBtn = document.getElementById('action-btn');

        function renderTiming() {
            timingList.innerHTML = '';
            drivers.sort((a, b) => a.pos - b.pos);

            drivers.forEach(d => {
                const team = teams[d.teamIdx];
                const isPlayer = d.teamIdx === 10;
                
                let gapText = "LEADER";
                if (d.pos > 1) {
                    if (d.status === "PIT") gapText = "PIT";
                    else gapText = `+${d.gap.toFixed(1)}s`;
                }

                const row = document.createElement('div');
                row.className = `timing-row ${isPlayer ? 'highlight' : ''}`;
                row.innerHTML = `
                    <div class="t-pos">${d.pos}</div>
                    <div class="t-driver-info">
                        <div class="team-dot" style="background:${team.color}"></div>
                        <div class="d-name">${d.name}</div>
                    </div>
                    <div class="t-gap">${gapText}</div>
                `;
                timingList.appendChild(row);
            });
        }

        function addCommentary(text) {
            const div = document.createElement('div');
            div.className = 'comm-item';
            div.innerHTML = `<span class="comm-lap">L${currentLap}</span> ${text}`;
            feed.prepend(div);
            if (feed.children.length > 30) feed.lastChild.remove();
        }

        function simulateLap() {
            if (currentLap >= totalLaps) {
                finishRace();
                return;
            }
            currentLap++;
            lapDisplay.innerText = currentLap;

            // Logic: Random Gap Changes
            drivers.forEach(d => {
                if (d.status === "Track") {
                    d.gap += (Math.random() - 0.5) * 1.5;
                    if (d.gap < 0.5 && d.pos !== 1) d.gap = 0.5;
                }
            });

            // Logic: Random Events
            const rand = Math.random();
            
            // Pit Stop
            if (rand > 0.92) {
                const pitter = drivers[Math.floor(Math.random() * drivers.length)];
                if (pitter.status === "Track") {
                    pitter.status = "PIT";
                    addCommentary(`${pitter.name} boxes for Hards! 🛠️`);
                }
            } else if (rand < 0.08) {
                const pitter = drivers.find(d => d.status === "PIT");
                if (pitter) {
                    pitter.status = "Track";
                    pitter.gap = 20.0 + Math.random() * 10;
                    addCommentary(`${pitter.name} rejoins in P${Math.floor(Math.random()*5)+15}.`);
                }
            }

            // Overtake
            if (rand > 0.6 && rand < 0.7) {
                const idx = Math.floor(Math.random() * (drivers.length - 1));
                const d1 = drivers[idx];
                const d2 = drivers[idx+1];
                if (d1.status === "Track" && d2.status === "Track") {
                    let tempPos = d1.pos;
                    d1.pos = d2.pos;
                    d2.pos = tempPos;
                    addCommentary(`<b>OVERTAKE!</b> ${d2.name} passes ${d1.name}!`);
                }
            }

            renderTiming();
        }

        function toggleRace() {
            if (isRunning) {
                clearInterval(intervalId);
                isRunning = false;
                actionBtn.innerText = "RESUME";
                actionBtn.className = "btn btn-start";
            } else {
                if (currentLap === 0) addCommentary("<b>LIGHTS OUT AND AWAY WE GO!</b> 🚩");
                isRunning = true;
                actionBtn.innerText = "PAUSE";
                actionBtn.className = "btn btn-pause";
                intervalId = setInterval(simulateLap, 1000); // Faster simulation
            }
        }

        function finishRace() {
            clearInterval(intervalId);
            isRunning = false;
            actionBtn.innerText = "FINISHED";
            actionBtn.disabled = true;
            addCommentary("<b>CHECKERED FLAG! RACE OVER!</b> 🏁");
        }

        renderTiming();
    </script>
</body>
</html>
