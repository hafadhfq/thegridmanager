<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>F1 Live Timing Dashboard</title>
    <link href="https://fonts.googleapis.com/css2?family=Racing+Sans+One&family=Roboto:wght@400;500;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-dark: #0f0f0f;
            --bg-panel: #1a1a1a;
            --border: #333;
            --text-main: #e0e0e0;
            --accent: #ff1801;
            --safe-bottom: env(safe-area-inset-bottom, 20px);
        }

        * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
        
        body {
            background-color: var(--bg-dark);
            color: var(--text-main);
            font-family: 'Roboto', sans-serif;
            min-height: 100dvh;
            overflow-y: auto;
            overflow-x: hidden;
            display: flex;
            flex-direction: column;
        }

        /* --- HEADER --- */
        .app-header {
            background: var(--bg-panel);
            padding: 15px 20px;
            border-bottom: 2px solid var(--accent);
            display: flex;
            justify-content: space-between;
            align-items: center;
            position: sticky;
            top: 0;
            z-index: 50;
        }
        .brand { font-family: 'Racing Sans One'; font-size: 20px; color: white; font-style: italic; }
        .brand span { color: var(--accent); }
        .track-info { text-align: right; font-size: 11px; color: #888; line-height: 1.2; }
        .track-info b { color: white; font-size: 12px; }

        /* --- MAIN LAYOUT --- */
        .main-container {
            flex: 1;
            display: flex;
            flex-direction: column;
            padding-bottom: calc(140px + var(--safe-bottom));
        }

        @media (min-width: 769px) {
            .main-container {
                flex-direction: row;
                height: calc(100dvh - 60px - 140px - var(--safe-bottom));
                padding-bottom: 0;
            }
        }

        /* --- LEFT: COMPACT TIMING --- */
        .timing-section {
            background: var(--bg-panel);
            width: 100%;
            flex-shrink: 0;
        }
        
        @media (min-width: 769px) {
            .timing-section {
                width: 320px;
                height: 100%;
                border-right: 1px solid var(--border);
            }
        }

        .panel-head {
            padding: 10px 15px;
            background: #222;
            font-size: 11px;
            font-weight: bold;
            text-transform: uppercase;
            color: var(--accent);
            border-bottom: 1px solid var(--border);
            display: flex;
            justify-content: space-between;
        }

        .t-row {
            display: grid;
            grid-template-columns: 30px 40px 1fr 35px 60px;
            align-items: center;
            padding: 10px 15px;
            border-bottom: 1px solid #222;
            font-size: 14px;
            gap: 8px;
        }
        .t-row.player { background: rgba(255, 215, 0, 0.08); border-left: 3px solid gold; }
        
        .t-pos { font-weight: bold; color: #666; font-size: 14px; }
        .t-team-logo { 
            width: 32px; height: 32px; border-radius: 50%; 
            display: flex; align-items: center; justify-content: center;
            font-weight: bold; font-size: 10px; color: white;
            text-shadow: 0 1px 2px rgba(0,0,0,0.8);
        }
        .t-driver { font-weight: 600; color: white; font-size: 14px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis;}
        
        .tire-badge {
            width: 28px; height: 28px; border-radius: 4px;
            font-size: 12px; font-weight: bold;
            display: flex; align-items: center; justify-content: center;
            color: black; flex-shrink: 0;
        }
        .tire-S { background: #ff1801; color: white; }
        .tire-M { background: #ffe600; }
        .tire-H { background: #ffffff; }
        .tire-I { background: #00ff00; }
        .tire-W { background: #0055ff; color: white; }

        .t-gap { 
            font-family: monospace; 
            font-size: 13px; 
            color: #aaa; 
            text-align: right;
            font-weight: 500;
        }

        /* --- RIGHT: COMMENTARY --- */
        .comm-section {
            flex: 1;
            background: #121212;
            min-height: 400px;
        }
        .comm-feed {
            padding: 15px;
            display: flex;
            flex-direction: column-reverse;
        }
        .c-item {
            margin-bottom: 12px;
            padding: 12px;
            background: #1a1a1a;
            border-radius: 8px;
            border-left: 3px solid #333;
            font-size: 13px;
            line-height: 1.4;
        }
        .c-item.strat { border-left-color: #00d2be; background: rgba(0, 210, 190, 0.1); }
        .c-item.danger { border-left-color: var(--accent); color: #ffaaaa; }
        .c-lap { font-weight: bold; color: #666; font-size: 10px; margin-right: 8px; display: inline-block; width: 25px;}

        /* --- DASHBOARD FOOTER --- */
        .dashboard-footer {
            position: fixed;
            bottom: 0;
            left: 0;
            width: 100%;
            background: #1a1a1a;
            border-top: 1px solid var(--border);
            padding: 15px 20px;
            padding-bottom: calc(15px + var(--safe-bottom)); 
            z-index: 100;
            box-shadow: 0 -5px 20px rgba(0,0,0,0.8);
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 15px;
        }

        .dash-item {
            display: flex;
            flex-direction: column;
            gap: 4px;
        }
        .dash-label { font-size: 10px; color: #888; text-transform: uppercase; font-weight: bold; letter-spacing: 0.5px; }
        .dash-value { font-family: 'Racing Sans One'; font-size: 22px; color: white; font-style: italic; }
        .dash-sub { font-size: 11px; color: #aaa; }

        @media (max-width: 400px) {
            .dashboard-footer { grid-template-columns: repeat(2, 1fr); }
            .dash-value { font-size: 18px; }
        }
    </style>
</head>
<body>

    <!-- Header -->
    <div class="app-header">
        <div class="brand">GRID <span>LIVE</span></div>
        <div class="track-info">
            <div>Circuit: <b>Monza 🇮🇹</b></div>
            <div>Weather: <b>Sunny (28°C)</b></div>
        </div>
    </div>

    <!-- Main Content -->
    <div class="main-container">
        
        <!-- Compact Timing Left -->
        <div class="timing-section">
            <div class="panel-head">
                <span>Live Classification</span>
                <span id="gap-mode-label">GAP TO LEADER</span>
            </div>
            <div class="timing-list" id="timing-list"></div>
        </div>

        <!-- Commentary Right/Bottom -->
        <div class="comm-section">
            <div class="panel-head">Race Control & Engineer Radio</div>
            <div class="comm-feed" id="feed">
                <div class="c-item">Mobil berada di grid. Strategi awal: Start Medium.</div>
            </div>
        </div>

    </div>

    <!-- Dashboard Footer -->
    <div class="dashboard-footer">
        <div class="dash-item">
            <div class="dash-label">Session Time</div>
            <div class="dash-value" id="session-time">10:00</div>
            <div class="dash-sub">Remaining</div>
        </div>
        <div class="dash-item">
            <div class="dash-label">Current Lap</div>
            <div class="dash-value"><span id="lap-num">0</span><span style="font-size:14px; color:#666">/53</span></div>
            <div class="dash-sub">Total Laps</div>
        </div>
        <div class="dash-item">
            <div class="dash-label">Fastest Lap</div>
            <div class="dash-value" id="fastest-lap">--:--</div>
            <div class="dash-sub" id="fastest-driver">Waiting...</div>
        </div>
        <div class="dash-item">
            <div class="dash-label">Track Status</div>
            <div class="dash-value" style="color: #00ff00;">GREEN</div>
            <div class="dash-sub">All Clear</div>
        </div>
    </div>

    <script>
        // --- DATA ---
        const teams = [
            { n: "Red Bull", c: "#0600EF", abbr: "RBR" }, 
            { n: "Mercedes", c: "#00D2BE", abbr: "MER" },
            { n: "Ferrari", c: "#FF1801", abbr: "FER" }, 
            { n: "McLaren", c: "#FF8700", abbr: "MCL" },
            { n: "Aston Martin", c: "#006F62", abbr: "AMR" }, 
            { n: "Alpine", c: "#0090FF", abbr: "ALP" },
            { n: "Williams", c: "#005AFF", abbr: "WIL" }, 
            { n: "RB", c: "#1634CB", abbr: "RB" },
            { n: "Sauber", c: "#000000", abbr: "SAU" }, 
            { n: "Haas", c: "#B6BABD", abbr: "HAA" },
            { n: "Grid FC", c: "#FFD700", abbr: "GFC" }
        ];

        let drivers = [];
        let lap = 0;
        let timer;
        let sessionSeconds = 600; // 10 minutes
        let gapMode = "leader"; // "leader" or "interval"
        let fastestTime = Infinity;
        let fastestDriverName = "";

        function initDrivers() {
            drivers = [
                { n: "VER", t: 0, p: 1, g: 0, tire: "M", status: "Track" },
                { n: "PER", t: 0, p: 2, g: 2.1, tire: "M", status: "Track" },
                { n: "HAM", t: 1, p: 3, g: 5.4, tire: "H", status: "Track" },
                { n: "RUS", t: 1, p: 4, g: 6.2, tire: "H", status: "Track" },
                { n: "LEC", t: 2, p: 5, g: 8.5, tire: "S", status: "Track" },
                { n: "SAI", t: 2, p: 6, g: 9.1, tire: "S", status: "Track" },
                { n: "NOR", t: 3, p: 7, g: 12.3, tire: "M", status: "Track" },
                { n: "PIA", t: 3, p: 8, g: 13.0, tire: "M", status: "Track" },
                { n: "ALO", t: 4, p: 9, g: 15.5, tire: "H", status: "Track" },
                { n: "STR", t: 4, p: 10, g: 18.2, tire: "H", status: "Track" },
                { n: "YOU", t: 10, p: 11, g: 19.5, tire: "M", status: "Track", isP: true }, 
                { n: "GAS", t: 5, p: 12, g: 20.1, tire: "M", status: "Track" },
                { n: "OCO", t: 5, p: 13, g: 21.5, tire: "M", status: "Track" },
                { n: "ALB", t: 6, p: 14, g: 25.0, tire: "H", status: "Track" },
                { n: "TEA", t: 10, p: 15, g: 26.4, tire: "S", status: "Track" },
                { n: "TSU", t: 7, p: 16, g: 28.9, tire: "M", status: "Track" },
                { n: "RIC", t: 7, p: 17, g: 30.1, tire: "M", status: "Track" },
                { n: "BOT", t: 8, p: 18, g: 35.2, tire: "H", status: "Track" },
                { n: "ZHO", t: 8, p: 19, g: 36.5, tire: "H", status: "Track" },
                { n: "HUL", t: 9, p: 20, g: 40.0, tire: "M", status: "Track" },
                { n: "MAG", t: 9, p: 21, g: 41.2, tire: "M", status: "Track" },
                { n: "COL", t: 6, p: 22, g: 45.0, tire: "S", status: "Track" }
            ];
        }

        // --- RENDER ---
        function renderTiming() {
            const list = document.getElementById('timing-list');
            list.innerHTML = '';
            drivers.sort((a,b) => a.p - b.p);

            drivers.forEach(d => {
                const team = teams[d.t];
                
                let gapText = "";
                if (d.p === 1) {
                    gapText = "LEADER";
                } else if (gapMode === "leader") {
                    gapText = `+${d.g.toFixed(1)}s`;
                } else {
                    // Interval mode: gap to car ahead
                    const carAhead = drivers.find(c => c.p === d.p - 1);
                    const interval = carAhead ? (d.g - carAhead.g).toFixed(1) : "+0.0";
                    gapText = `+${interval}s`;
                }

                const row = document.createElement('div');
                row.className = `t-row ${d.isP ? 'player' : ''}`;
                
                row.innerHTML = `
                    <div class="t-pos">${d.p}</div>
                    <div class="t-team-logo" style="background:${team.c}">${team.abbr}</div>
                    <div class="t-driver">${d.n}</div>
                    <div class="tire-badge tire-${d.tire}">${d.tire}</div>
                    <div class="t-gap">${gapText}</div>
                `;
                list.appendChild(row);
            });
        }

        function addLog(text, type="normal") {
            const feed = document.getElementById('feed');
            const div = document.createElement('div');
            div.className = `c-item ${type}`;
            div.innerHTML = `<span class="c-lap">L${lap}</span> ${text}`;
            feed.prepend(div);
        }

        function updateSessionTimer() {
            if (sessionSeconds <= 0) {
                clearInterval(timer);
                addLog(" CHECKERED FLAG! Balapan Selesai.", "strat");
                document.querySelector('.dash-value').innerText = "00:00";
                return;
            }
            
            sessionSeconds--;
            const mins = Math.floor(sessionSeconds / 60).toString().padStart(2, '0');
            const secs = (sessionSeconds % 60).toString().padStart(2, '0');
            document.getElementById('session-time').innerText = `${mins}:${secs}`;
        }

        function toggleGapMode() {
            gapMode = gapMode === "leader" ? "interval" : "leader";
            document.getElementById('gap-mode-label').innerText = 
                gapMode === "leader" ? "GAP TO LEADER" : "INTERVAL GAP";
            renderTiming();
        }

        // --- SIMULATION LOGIC ---
        function simulateLap() {
            if(lap >= 53 || sessionSeconds <= 0) { 
                if(sessionSeconds > 0) finishRace(); 
                return; 
            }
            
            lap++;
            document.getElementById('lap-num').innerText = lap;

            drivers.forEach(d => {
                if(d.status === "Track") {
                    let change = (Math.random() - 0.5) * 1.5;
                    d.g += change;
                    if(d.g < 0.5 && d.p !== 1) d.g = 0.5;

                    // Simulate fastest lap tracking
                    const currentLapTime = 85 + (Math.random() * 3); // Base ~85s
                    if(currentLapTime < fastestTime) {
                        fastestTime = currentLapTime;
                        fastestDriverName = d.n;
                        const m = Math.floor(fastestTime / 60);
                        const s = (fastestTime % 60).toFixed(3);
                        document.getElementById('fastest-lap').innerText = `${m}:${s.toFixed(3)}`;
                        document.getElementById('fastest-driver').innerText = d.n;
                    }
                }
            });

            // Random Overtakes
            if(Math.random() > 0.7) {
                const idx = Math.floor(Math.random() * (drivers.length - 1));
                const d1 = drivers[idx];
                const d2 = drivers[idx+1];
                if(d1.status === "Track" && d2.status === "Track") {
                    let tempP = d1.p; d1.p = d2.p; d2.p = tempP;
                    addLog(`⚔️ ${d2.n} menyalip ${d1.n}!`);
                }
            }

            renderTiming();
        }

        function finishRace() {
            clearInterval(timer);
            addLog(" CHECKERED FLAG! Balapan Selesai.", "strat");
        }

        function startAutoRace() {
            // Auto start immediately
            timer = setInterval(() => {
                simulateLap();
                updateSessionTimer();
            }, 1000);

            // Toggle gap mode every 8 seconds
            setInterval(toggleGapMode, 8000);
            
            addLog("🚩 LIGHTS OUT! BALAPAN DIMULAI!", "danger");
        }

        // Init
        initDrivers();
        renderTiming();
        startAutoRace();

    </script>
</body>
</html>
