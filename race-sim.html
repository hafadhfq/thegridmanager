<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Live Race - Grid Manager</title>
    <link href="https://fonts.googleapis.com/css2?family=Racing+Sans+One&family=Roboto:wght@400;700&display=swap" rel="stylesheet">
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        
        body {
            background-color: #0f0f0f;
            color: #e0e0e0;
            font-family: 'Roboto', sans-serif;
            padding-bottom: 20px;
        }

        /* --- LIVE HEADER --- */
        .live-header {
            background: #1a1a1a;
            padding: 15px;
            position: sticky; top: 0; z-index: 100;
            border-bottom: 2px solid #ff1801;
            display: flex; justify-content: space-between; align-items: center;
        }
        .race-title { font-family: 'Racing Sans One'; font-size: 18px; color: white; }
        .lap-counter { 
            background: #333; padding: 5px 10px; border-radius: 5px; 
            font-weight: bold; color: #00ff00; font-size: 14px;
        }
        .live-dot {
            width: 10px; height: 10px; background: red; border-radius: 50%;
            display: inline-block; margin-right: 5px; animation: blink 1s infinite;
        }
        @keyframes blink { 50% { opacity: 0; } }

        /* --- MAIN LAYOUT (Split View) --- */
        .race-container {
            display: grid;
            grid-template-columns: 1fr;
            gap: 20px;
            padding: 15px;
        }
        @media (min-width: 768px) {
            .race-container { grid-template-columns: 1fr 1fr; }
        }

        /* --- COMMENTARY BOX --- */
        .comm-box {
            background: #1a1a1a;
            border: 1px solid #333;
            border-radius: 12px;
            height: 400px;
            overflow-y: auto;
            padding: 15px;
            display: flex;
            flex-direction: column-reverse; /* Newest at bottom visually if we append normally, but let's stick to standard */
        }
        
        .comm-entry {
            margin-bottom: 12px;
            padding-bottom: 12px;
            border-bottom: 1px solid #222;
            font-size: 13px;
            line-height: 1.5;
        }
        .comm-lap { font-weight: bold; color: #ff1801; margin-right: 5px; }
        .comm-flag { margin-right: 5px; }

        /* --- LIVE STANDINGS --- */
        .standings-box {
            background: #1a1a1a;
            border: 1px solid #333;
            border-radius: 12px;
            padding: 15px;
        }
        .st-title { font-family: 'Racing Sans One'; font-size: 16px; margin-bottom: 15px; border-left: 3px solid #00d2be; padding-left: 10px; }

        .live-row {
            display: flex;
            align-items: center;
            padding: 8px 0;
            border-bottom: 1px solid #222;
            font-size: 13px;
        }
        .lr-pos { width: 25px; font-weight: bold; color: #666; }
        .lr-info { flex: 1; display: flex; align-items: center; gap: 8px; }
        .lr-team-indicator { width: 4px; height: 15px; border-radius: 2px; }
        .lr-name { color: white; font-weight: 500; }
        .lr-gap { color: #888; font-size: 11px; width: 60px; text-align: right; }

        /* --- CONTROLS --- */
        .controls {
            position: fixed; bottom: 0; left: 0; width: 100%;
            background: #1a1a1a; padding: 15px;
            border-top: 1px solid #333;
            display: flex; gap: 10px; justify-content: center;
        }
        .btn-sim {
            background: #ff1801; color: white; border: none;
            padding: 10px 20px; border-radius: 8px; font-weight: bold;
            cursor: pointer; flex: 1; max-width: 200px;
        }
        .btn-menu {
            background: #333; color: white; border: none;
            padding: 10px 20px; border-radius: 8px; font-weight: bold;
            cursor: pointer;
        }
    </style>
</head>
<body>

    <!-- Live Header -->
    <div class="live-header">
        <div class="race-title"><span class="live-dot"></span>CANADIAN GP</div>
        <div class="lap-counter">LAP <span id="current-lap">1</span>/70</div>
    </div>

    <div class="race-container">
        <!-- Left: Commentary -->
        <div class="comm-box" id="commentary-feed">
            <div class="comm-entry">
                <span class="comm-lap">LAP 1</span> Lights out and away we go! Verstappen gets a great start from P1.
            </div>
        </div>

        <!-- Right: Live Standings -->
        <div class="standings-box">
            <div class="st-title">LIVE CLASSIFICATION</div>
            <div id="live-standings">
                <!-- Will be populated by JS -->
            </div>
        </div>
    </div>

    <!-- Controls -->
    <div class="controls">
        <button class="btn-menu" onclick="window.location.href='calendar.html'">Menu</button>
        <button class="btn-sim" id="sim-btn" onclick="toggleSimulation()">START RACE</button>
    </div>

    <script>
        // Data Awal
        let currentLap = 1;
        let isRunning = false;
        let intervalId;

        const drivers = [
            { name: "M. Verstappen", team: "Red Bull", color: "#0055ff", pos: 1, gap: "Leader" },
            { name: "L. Hamilton", team: "Mercedes", color: "#00d2be", pos: 2, gap: "+1.2s" },
            { name: "C. Leclerc", team: "Ferrari", color: "#ff1801", pos: 3, gap: "+2.5s" },
            { name: "YOU (Player)", team: "Grid Mgr", color: "#ffd700", pos: 4, gap: "+3.1s" },
            { name: "F. Alonso", team: "Aston Martin", color: "#006f62", pos: 5, gap: "+5.4s" }
        ];

        const events = [
            "Verstappen sets the fastest lap of the race!",
            "Hamilton is pushing hard, closing the gap to P1.",
            "Leclerc reports some vibration on the front left tire.",
            "Yellow flag in Sector 2, debris on track.",
            "DRS enabled for the next 2 zones.",
            "Your engineer says: 'Push now, box in 2 laps.'",
            "Alonso defends brilliantly from behind!"
        ];

        function renderStandings() {
            const container = document.getElementById('live-standings');
            container.innerHTML = '';
            
            // Sort by position
            drivers.sort((a, b) => a.pos - b.pos);

            drivers.forEach(d => {
                const row = `
                    <div class="live-row">
                        <div class="lr-pos">${d.pos}</div>
                        <div class="lr-info">
                            <div class="lr-team-indicator" style="background:${d.color}"></div>
                            <span class="lr-name">${d.name}</span>
                        </div>
                        <div class="lr-gap">${d.gap}</div>
                    </div>
                `;
                container.innerHTML += row;
            });
        }

        function addCommentary(text) {
            const feed = document.getElementById('commentary-feed');
            const entry = document.createElement('div');
            entry.className = 'comm-entry';
            entry.innerHTML = `<span class="comm-lap">LAP ${currentLap}</span> ${text}`;
            feed.prepend(entry); // Add to top
        }

        function simulateLap() {
            if (currentLap >= 70) {
                clearInterval(intervalId);
                document.getElementById('sim-btn').innerText = "FINISH";
                addCommentary("🏁 CHECKERED FLAG! Race Finished.");
                return;
            }

            currentLap++;
            document.getElementById('current-lap').innerText = currentLap;

            // Randomize gaps slightly
            drivers.forEach(d => {
                if (d.pos !== 1) {
                    let change = (Math.random() * 0.5).toFixed(1);
                    d.gap = `+${(parseFloat(d.gap.replace('+','')) + parseFloat(change)).toFixed(1)}s`;
                }
            });

            // Random Event Chance
            if (Math.random() > 0.7) {
                const randomEvent = events[Math.floor(Math.random() * events.length)];
                addCommentary(randomEvent);
            } else {
                addCommentary(`Drivers complete Lap ${currentLap}. Pace is steady.`);
            }

            renderStandings();
        }

        function toggleSimulation() {
            const btn = document.getElementById('sim-btn');
            if (!isRunning) {
                isRunning = true;
                btn.innerText = "PAUSE RACE";
                btn.style.background = "#ffd700"; // Yellow for pause
                btn.style.color = "black";
                intervalId = setInterval(simulateLap, 2000); // Speed: 2 seconds per lap
            } else {
                isRunning = false;
                btn.innerText = "RESUME RACE";
                btn.style.background = "#ff1801"; // Red for resume
                btn.style.color = "white";
                clearInterval(intervalId);
            }
        }

        // Initial Render
        renderStandings();
    </script>
</body>
</html>
