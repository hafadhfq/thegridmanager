<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ultimate Race Sim</title>
    <link href="https://fonts.googleapis.com/css2?family=Racing+Sans+One&family=Roboto:wght@400;500;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-dark: #0f0f0f;
            --bg-panel: #1a1a1a;
            --border: #333;
            --text-main: #e0e0e0;
            --text-dim: #888;
            --accent: #ff1801;
            --soft: #ff1801;
            --med: #ffe600;
            --hard: #ffffff;
            --wet: #0055ff;
            --inter: #00ff00;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }
        
        body {
            background-color: var(--bg-dark);
            color: var(--text-main);
            font-family: 'Roboto', sans-serif;
            height: 100vh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        /* --- HEADER --- */
        .app-header {
            background: var(--bg-panel);
            padding: 10px 15px;
            border-bottom: 2px solid var(--accent);
            display: flex;
            justify-content: space-between;
            align-items: center;
            height: 60px;
            flex-shrink: 0;
        }
        .h-left h1 { font-family: 'Racing Sans One'; font-size: 20px; color: white; }
        .h-left span { font-size: 12px; color: var(--text-dim); }
        
        .weather-widget {
            text-align: right;
            background: #222;
            padding: 5px 10px;
            border-radius: 8px;
            border: 1px solid #333;
        }
        .w-icon { font-size: 18px; }
        .w-temp { font-weight: bold; font-size: 14px; }
        .w-cond { font-size: 10px; color: var(--text-dim); }

        /* --- MAIN GRID --- */
        .main-grid {
            display: flex;
            flex: 1;
            overflow: hidden;
        }

        /* --- LEFT: COMMENTARY --- */
        .comm-section {
            flex: 1;
            display: flex;
            flex-direction: column;
            background: #121212;
            border-right: 1px solid var(--border);
        }
        .panel-head {
            padding: 8px 15px;
            background: #222;
            font-size: 11px;
            font-weight: bold;
            text-transform: uppercase;
            color: var(--text-dim);
            border-bottom: 1px solid var(--border);
        }
        .comm-feed {
            flex: 1;
            overflow-y: auto;
            padding: 10px;
            display: flex;
            flex-direction: column-reverse;
        }
        .c-item {
            font-size: 13px;
            margin-bottom: 10px;
            padding-left: 10px;
            border-left: 3px solid #333;
            line-height: 1.4;
            animation: slideIn 0.3s ease;
        }
        .c-item.sc { border-left-color: #ffaa00; background: rgba(255, 170, 0, 0.1); padding: 5px; border-radius: 4px; }
        .c-item.crash { border-left-color: red; color: #ffaaaa; }
        .c-lap { color: var(--accent); font-weight: bold; font-size: 11px; margin-right: 5px; }

        /* --- RIGHT: TIMING --- */
        .timing-section {
            width: 320px;
            background: var(--bg-panel);
            display: flex;
            flex-direction: column;
            flex-shrink: 0;
        }
        .timing-list { flex: 1; overflow-y: auto; }
        
        .t-row {
            display: flex;
            align-items: center;
            padding: 8px 10px;
            border-bottom: 1px solid #222;
            font-size: 13px;
        }
        .t-row.player { background: rgba(255, 215, 0, 0.1); border-left: 3px solid gold; }
        
        .t-pos { width: 25px; font-weight: bold; color: var(--text-dim); font-size: 12px; }
        .t-info { flex: 1; display: flex; align-items: center; gap: 8px; overflow: hidden; }
        
        .team-dot { width: 6px; height: 20px; border-radius: 2px; flex-shrink: 0; }
        .d-name { white-space: nowrap; overflow: hidden; text-overflow: ellipsis; font-weight: 500; }
        
        /* Tyre Badge */
        .tyre-badge {
            width: 18px; height: 18px;
            border-radius: 3px;
            font-size: 9px;
            font-weight: bold;
            display: flex; align-items: center; justify-content: center;
            color: black;
            flex-shrink: 0;
        }
        .tyre-S { background: var(--soft); color: white; }
        .tyre-M { background: var(--med); }
        .tyre-H { background: var(--hard); }
        .tyre-I { background: var(--inter); }
        .tyre-W { background: var(--wet); color: white; }

        .t-gap { 
            font-family: monospace; 
            font-size: 12px; 
            color: var(--text-dim); 
            text-align: right;
            min-width: 60px;
        }
        .gap-val { color: #fff; }

        /* --- FOOTER --- */
        .app-footer {
            height: 50px;
            background: var(--bg-panel);
            border-top: 1px solid var(--border);
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 0 20px;
            flex-shrink: 0;
        }
        .lap-display { font-family: 'Racing Sans One'; font-size: 24px; color: white; }
        .controls { display: flex; gap: 10px; }
        
        .btn {
            padding: 8px 20px;
            border-radius: 4px;
            border: none;
            font-weight: bold;
            cursor: pointer;
            font-size: 12px;
            text-transform: uppercase;
        }
        .btn-go { background: var(--accent); color: white; }
        .btn-stop { background: #333; color: white; }

        @keyframes slideIn { from { opacity: 0; transform: translateX(-10px); } to { opacity: 1; transform: translateX(0); } }

        /* Mobile */
        @media (max-width: 768px) {
            .main-grid { flex-direction: column; }
            .timing-section { width: 100%; height: 45%; order: -1; border-bottom: 1px solid var(--border); }
            .comm-section { height: 55%; }
        }
    </style>
</head>
<body>

    <!-- Header -->
    <div class="app-header">
        <div class="h-left">
            <h1>🇨🇦 CANADIAN GP</h1>
            <span>Circuit Gilles Villeneuve</span>
        </div>
        <div class="weather-widget">
            <div class="w-icon" id="w-icon">☀️</div>
            <div class="w-temp" id="w-temp">24°C</div>
            <div class="w-cond" id="w-cond">Sunny</div>
        </div>
    </div>

    <!-- Main Grid -->
    <div class="main-grid">
        <!-- Left: Commentary -->
        <div class="comm-section">
            <div class="panel-head">Race Control & Commentary</div>
            <div class="comm-feed" id="feed">
                <div class="c-item">Formasi grid sedang dipersiapkan...</div>
            </div>
        </div>

        <!-- Right: Timing -->
        <div class="timing-section">
            <div class="panel-head">Live Classification</div>
            <div class="timing-list" id="timing-list"></div>
        </div>
    </div>

    <!-- Footer -->
    <div class="app-footer">
        <div class="lap-display">LAP <span id="lap-num">0</span><span style="font-size:14px; color:#666">/70</span></div>
        <div class="controls">
            <button class="btn btn-stop" onclick="resetSim()">Reset</button>
            <button class="btn btn-go" id="start-btn" onclick="toggleSim()" disabled>START IN 5s</button>
        </div>
    </div>

    <script>
        // --- DATA ---
        const teams = [
            { n: "Red Bull", c: "#0600EF" }, { n: "Mercedes", c: "#00D2BE" },
            { n: "Ferrari", c: "#FF1801" }, { n: "McLaren", c: "#FF8700" },
            { n: "Aston Martin", c: "#006F62" }, { n: "Alpine", c: "#0090FF" },
            { n: "Williams", c: "#005AFF" }, { n: "RB", c: "#1634CB" },
            { n: "Sauber", c: "#000000" }, { n: "Haas", c: "#B6BABD" },
            { n: "Grid FC", c: "#FFD700" }
        ];

        // Initial Drivers with Tyres
        let drivers = [
            { n: "Verstappen", t: 0, p: 1, g: 0, tyre: "M", status: "Track" },
            { n: "Perez", t: 0, p: 2, g: 2.1, tyre: "M", status: "Track" },
            { n: "Hamilton", t: 1, p: 3, g: 5.4, tyre: "H", status: "Track" },
            { n: "Russell", t: 1, p: 4, g: 6.2, tyre: "H", status: "Track" },
            { n: "Leclerc", t: 2, p: 5, g: 8.5, tyre: "S", status: "Track" },
            { n: "Sainz", t: 2, p: 6, g: 9.1, tyre: "S", status: "Track" },
            { n: "Norris", t: 3, p: 7, g: 12.3, tyre: "M", status: "Track" },
            { n: "Piastri", t: 3, p: 8, g: 13.0, tyre: "M", status: "Track" },
            { n: "Alonso", t: 4, p: 9, g: 15.5, tyre: "H", status: "Track" },
            { n: "Stroll", t: 4, p: 10, g: 18.2, tyre: "H", status: "Track" },
            // PLAYER
            { n: "YOU (Player)", t: 10, p: 11, g: 19.5, tyre: "S", status: "Track", isP: true }, 
            { n: "Gasly", t: 5, p: 12, g: 20.1, tyre: "M", status: "Track" },
            { n: "Ocon", t: 5, p: 13, g: 21.5, tyre: "M", status: "Track" },
            { n: "Albon", t: 6, p: 14, g: 25.0, tyre: "H", status: "Track" },
            { n: "Teammate", t: 10, p: 15, g: 26.4, tyre: "S", status: "Track" },
            { n: "Tsunoda", t: 7, p: 16, g: 28.9, tyre: "M", status: "Track" },
            { n: "Ricciardo", t: 7, p: 17, g: 30.1, tyre: "M", status: "Track" },
            { n: "Bottas", t: 8, p: 18, g: 35.2, tyre: "H", status: "Track" },
            { n: "Zhou", t: 8, p: 19, g: 36.5, tyre: "H", status: "Track" },
            { n: "Hulkenberg", t: 9, p: 20, g: 40.0, tyre: "M", status: "Track" },
            { n: "Magnussen", t: 9, p: 21, g: 41.2, tyre: "M", status: "Track" },
            { n: "Colapinto", t: 6, p: 22, g: 45.0, tyre: "H", status: "Track" }
        ];

        let lap = 0;
        let running = false;
        let timer;
        let weather = "Sunny"; // Sunny, Cloudy, Rain

        // --- RENDER FUNCTIONS ---
        function renderTiming() {
            const list = document.getElementById('timing-list');
            list.innerHTML = '';
            drivers.sort((a,b) => a.p - b.p);

            drivers.forEach(d => {
                const team = teams[d.t];
                let gapText = d.p === 1 ? "LEADER" : `+${d.g.toFixed(1)}s`;
                if (d.status === "PIT") gapText = "PITTING";
                if (d.status === "DNF") gapText = "DNF";

                const row = document.createElement('div');
                row.className = `t-row ${d.isP ? 'player' : ''}`;
                row.style.opacity = d.status === "DNF" ? "0.3" : "1";
                
                row.innerHTML = `
                    <div class="t-pos">${d.p}</div>
                    <div class="t-info">
                        <div class="team-dot" style="background:${team.c}"></div>
                        <div class="d-name">${d.n}</div>
                    </div>
                    <div class="tyre-badge tyre-${d.tyre}">${d.tyre}</div>
                    <div class="t-gap"><span class="gap-val">${gapText}</span></div>
                `;
                list.appendChild(row);
            });
        }

        function addLog(text, type="normal") {
            const feed = document.getElementById('feed');
            const div = document.createElement('div');
            div.className = `c-item ${type}`;
            div.innerHTML = `<span class="c-lap">L${lap}</span> ${text}`;
            feed.prepend(div);
        }

        function updateWeather() {
            const rand = Math.random();
            if (rand > 0.9) {
                weather = "Rain";
                document.getElementById('w-icon').innerText = "🌧️";
                document.getElementById('w-cond').innerText = "Heavy Rain";
                document.getElementById('w-temp').innerText = "18°C";
                addLog("🌧️ HUJAN DERAS! Track menjadi sangat licin!", "sc");
                // Force everyone to wet tyres eventually if raining long enough
            } else if (rand < 0.1) {
                weather = "Sunny";
                document.getElementById('w-icon').innerText = "☀️";
                document.getElementById('w-cond').innerText = "Sunny";
                document.getElementById('w-temp').innerText = "24°C";
                addLog("☀️ Hujan reda, trek mulai kering.");
            }
        }

        // --- SIMULATION LOGIC ---
        function simulateLap() {
            if(lap >= 70) { finishRace(); return; }
            lap++;
            document.getElementById('lap-num').innerText = lap;

            // 1. Weather Change Chance
            if(Math.random() > 0.95) updateWeather();

            // 2. Driver Logic
            drivers.forEach(d => {
                if(d.status === "Track") {
                    // Gap fluctuation
                    d.g += (Math.random() - 0.5) * 1.5;
                    if(d.g < 0.5 && d.p !== 1) d.g = 0.5;

                    // Pit Stop Logic (Random)
                    if(Math.random() > 0.96) {
                        d.status = "PIT";
                        d.tyre = d.tyre === "S" ? "H" : "M"; // Simple strategy change
                        addLog(`🛠️ ${d.n} masuk pit untuk ganti ban ${d.tyre}.`);
                        setTimeout(() => {
                            if(d.status === "PIT") {
                                d.status = "Track";
                                d.g = 25.0; // Rejoin with gap
                                addLog(`✅ ${d.n} keluar dari pit lane.`);
                            }
                        }, 3000);
                    }
                }
            });

            // 3. Events (Crash/Overtake)
            const eventRand = Math.random();
            
            if (eventRand > 0.98) {
                // CRASH
                const victim = drivers[Math.floor(Math.random() * drivers.length)];
                if(victim.status === "Track") {
                    victim.status = "DNF";
                    victim.p = 99;
                    addLog(`💥 KRUSIAL! ${victim.n} mengalami kecelakaan besar! Safety Car deployed.`, "crash");
                }
            } else if (eventRand > 0.7) {
                // OVERTAKE
                const idx = Math.floor(Math.random() * (drivers.length - 2));
                const d1 = drivers[idx];
                const d2 = drivers[idx+1];
                
                if(d1.status === "Track" && d2.status === "Track") {
                    let tempP = d1.p; d1.p = d2.p; d2.p = tempP;
                    addLog(`⚔️ Pertarungan seru! ${d2.n} menyalip ${d1.n} di tikungan terakhir!`);
                }
            }

            renderTiming();
        }

        function toggleSim() {
            const btn = document.getElementById('start-btn');
            if(running) {
                clearInterval(timer);
                running = false;
                btn.innerText = "RESUME";
                btn.style.background = "#333";
            } else {
                if(lap === 0) addLog("🚩 LIGHTS OUT! BALAPAN DIMULAI!");
                running = true;
                btn.innerText = "PAUSE";
                btn.style.background = "#ff1801";
                timer = setInterval(simulateLap, 1000);
            }
        }

        function resetSim() {
            clearInterval(timer);
            running = false;
            lap = 0;
            weather = "Sunny";
            document.getElementById('w-icon').innerText = "☀️";
            document.getElementById('w-cond').innerText = "Sunny";
            document.getElementById('lap-num').innerText = "0";
            
            const btn = document.getElementById('start-btn');
            btn.innerText = "START RACE";
            btn.disabled = false;
            btn.style.background = "";

            document.getElementById('feed').innerHTML = '<div class="c-item">Formasi grid sedang dipersiapkan...</div>';
            
            // Reset drivers
            drivers.forEach((d, i) => { 
                d.p = i + 1; d.g = i * 2.5; d.status = "Track"; 
                d.tyre = i % 2 === 0 ? "S" : "M"; // Randomize start tyres
            });
            renderTiming();
        }

        function finishRace() {
            clearInterval(timer);
            running = false;
            addLog("🏁 CHECKERED FLAG! Balapan Selesai.", "sc");
            document.getElementById('start-btn').innerText = "FINISHED";
        }

        // Init
        renderTiming();
        
        // Auto Start Countdown
        let count = 5;
        const cdTimer = setInterval(() => {
            document.getElementById('start-btn').innerText = `START IN ${count}s`;
            count--;
            if(count < 0) {
                clearInterval(cdTimer);
                toggleSim();
            }
        }, 1000);

    </script>
</body>
</html>
