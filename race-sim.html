<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Race Dynamic Timer</title>
    <link href="https://fonts.googleapis.com/css2?family=Racing+Sans+One&family=Roboto:wght@400;500;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-dark: #0f0f0f;
            --bg-panel: #1a1a1a;
            --border: #333;
            --text-main: #e0e0e0;
            --accent: #ff1801;
            --safe-bottom: env(safe-area-inset-bottom, 20px);
        }

        * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
        
        body {
            background-color: var(--bg-dark);
            color: var(--text-main);
            font-family: 'Roboto', sans-serif;
            height: 100dvh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        /* --- HEADER --- */
        .app-header {
            background: var(--bg-panel);
            padding: 12px 15px;
            border-bottom: 2px solid var(--accent);
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-shrink: 0;
            z-index: 10;
        }
        .brand { font-family: 'Racing Sans One'; font-size: 18px; color: white; font-style: italic; }
        .brand span { color: var(--accent); }
        .race-info { text-align: right; font-size: 11px; line-height: 1.3; }
        .race-clock { 
            font-family: monospace; 
            font-size: 14px; 
            color: #fff; 
            background: #000; 
            padding: 4px 8px; 
            border-radius: 4px; 
            border: 1px solid #333;
            display: inline-block;
            margin-top: 2px;
        }

        /* --- MAIN SPLIT LAYOUT --- */
        .main-split {
            display: flex;
            flex: 1;
            overflow: hidden;
        }

        /* LEFT: COMPACT TIMING TABLE */
        .timing-col {
            width: 35%;
            min-width: 260px;
            background: var(--bg-panel);
            border-right: 1px solid var(--border);
            display: flex;
            flex-direction: column;
            flex-shrink: 0;
        }
        .col-head {
            padding: 8px 10px;
            background: #222;
            font-size: 10px;
            font-weight: bold;
            text-transform: uppercase;
            color: var(--accent);
            border-bottom: 1px solid var(--border);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .gap-toggle { 
            color: #888; 
            font-weight: normal; 
            font-size: 9px;
            transition: color 0.3s;
        }
        .gap-toggle.active { color: #00d2be; }
        
        .timing-list {
            flex: 1;
            overflow-y: auto;
            padding-bottom: 20px;
        }
        
        .t-row {
            display: grid;
            grid-template-columns: 22px 1fr 28px 50px;
            align-items: center;
            padding: 7px 10px;
            border-bottom: 1px solid #222;
            font-size: 12px;
        }
        .t-row.player { background: rgba(255, 215, 0, 0.08); }
        
        .t-pos { font-weight: bold; color: #666; font-size: 12px; }
        .t-driver { display: flex; align-items: center; gap: 5px; overflow: hidden; }
        .team-stripe { width: 3px; height: 12px; border-radius: 1px; flex-shrink: 0; }
        .d-code { font-weight: 700; color: white; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        
        .tyre-badge {
            width: 14px; height: 14px; border-radius: 3px;
            font-size: 8px; font-weight: bold;
            display: flex; align-items: center; justify-content: center;
            color: black; flex-shrink: 0;
        }
        .tyre-S { background: #ff1801; color: white; }
        .tyre-M { background: #ffe600; }
        .tyre-H { background: #ffffff; }
        .tyre-I { background: #00ff00; }
        .tyre-W { background: #0055ff; color: white; }

        .t-gap { 
            font-family: monospace; 
            font-size: 11px; 
            color: #aaa; 
            text-align: right;
            white-space: nowrap;
        }

        /* RIGHT: LIVE COMMENTARY */
        .comm-col {
            flex: 1;
            background: #121212;
            display: flex;
            flex-direction: column;
        }
        .comm-feed {
            flex: 1;
            overflow-y: auto;
            padding: 12px;
            display: flex;
            flex-direction: column-reverse;
        }
        .c-item {
            margin-bottom: 10px;
            padding: 10px;
            background: #1a1a1a;
            border-radius: 6px;
            border-left: 3px solid #333;
            font-size: 13px;
            line-height: 1.4;
        }
        .c-item.strat { border-left-color: #00d2be; background: rgba(0, 210, 190, 0.1); }
        .c-item.danger { border-left-color: var(--accent); color: #ffaaaa; }
        .c-lap { font-weight: bold; color: #666; font-size: 10px; margin-right: 6px; }

        /* --- BOTTOM NAVIGATION FOOTER --- */
        .nav-footer {
            height: 60px;
            background: #1a1a1a;
            border-top: 1px solid var(--border);
            display: flex;
            justify-content: space-around;
            align-items: center;
            padding-bottom: var(--safe-bottom);
            flex-shrink: 0;
            z-index: 100;
        }
        .nav-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 4px;
            color: #666;
            font-size: 10px;
            text-decoration: none;
            transition: 0.2s;
        }
        .nav-item.active { color: var(--accent); }
        .nav-icon { font-size: 20px; }

        @media (max-width: 480px) {
            .timing-col { width: 40%; min-width: unset; }
            .t-row { grid-template-columns: 20px 1fr 24px 42px; padding: 6px 8px; font-size: 11px; }
        }
    </style>
</head>
<body>

    <!-- Header -->
    <div class="app-header">
        <div class="brand">GRID <span>LIVE</span></div>
        <div class="race-info">
            <div style="color:#888">TARGET: 10 MINUTES</div>
            <div class="race-clock" id="race-clock">10:00</div>
        </div>
    </div>

    <!-- Main Split Content -->
    <div class="main-split">
        
        <!-- Left: Timing Table -->
        <div class="timing-col">
            <div class="col-head">
                <span>Classification</span>
                <span class="gap-toggle active" id="gap-label">GAP TO LEADER</span>
            </div>
            <div class="timing-list" id="timing-list"></div>
        </div>

        <!-- Right: Commentary -->
        <div class="comm-col">
            <div class="col-head">Live Commentary</div>
            <div class="comm-feed" id="feed">
                <div class="c-item">Sistem siap. Balapan akan dimulai otomatis.</div>
            </div>
        </div>

    </div>

    <!-- Bottom Navigation Footer -->
    <div class="nav-footer">
        <a href="#" class="nav-item active">
            <span class="nav-icon">🏠</span>
            <span>Dashboard</span>
        </a>
        <a href="#" class="nav-item">
            <span class="nav-icon">📊</span>
            <span>Stats</span>
        </a>
        <a href="#" class="nav-item">
            <span class="nav-icon">️</span>
            <span>Settings</span>
        </a>
    </div>

    <script>
        // --- DATA & CONFIG ---
        const TEAMS = [
            { n: "Red Bull", c: "#0600EF" }, { n: "Mercedes", c: "#00D2BE" },
            { n: "Ferrari", c: "#FF1801" }, { n: "McLaren", c: "#FF8700" },
            { n: "Aston Martin", c: "#006F62" }, { n: "Alpine", c: "#0090FF" },
            { n: "Williams", c: "#005AFF" }, { n: "RB", c: "#1634CB" },
            { n: "Sauber", c: "#000000" }, { n: "Haas", c: "#B6BABD" },
            { n: "Grid FC", c: "#FFD700" }
        ];

        const TOTAL_LAPS = 53;
        const TOTAL_TIME_SECONDS = 600; // 10 minutes exactly

        let drivers = [
            { code: "VER", full: "Max Verstappen", t: 0, p: 1, g: 0, tyre: "M", status: "Track" },
            { code: "PER", full: "Sergio Perez", t: 0, p: 2, g: 2.1, tyre: "M", status: "Track" },
            { code: "HAM", full: "Lewis Hamilton", t: 1, p: 3, g: 5.4, tyre: "H", status: "Track" },
            { code: "RUS", full: "George Russell", t: 1, p: 4, g: 6.2, tyre: "H", status: "Track" },
            { code: "LEC", full: "Charles Leclerc", t: 2, p: 5, g: 8.5, tyre: "S", status: "Track" },
            { code: "SAI", full: "Carlos Sainz", t: 2, p: 6, g: 9.1, tyre: "S", status: "Track" },
            { code: "NOR", full: "Lando Norris", t: 3, p: 7, g: 12.3, tyre: "M", status: "Track" },
            { code: "PIA", full: "Oscar Piastri", t: 3, p: 8, g: 13.0, tyre: "M", status: "Track" },
            { code: "ALO", full: "Fernando Alonso", t: 4, p: 9, g: 15.5, tyre: "H", status: "Track" },
            { code: "STR", full: "Lance Stroll", t: 4, p: 10, g: 18.2, tyre: "H", status: "Track" },
            { code: "YOU", full: "You (Player)", t: 10, p: 11, g: 19.5, tyre: "M", status: "Track", isP: true }, 
            { code: "GAS", full: "Pierre Gasly", t: 5, p: 12, g: 20.1, tyre: "M", status: "Track" },
            { code: "OCO", full: "Esteban Ocon", t: 5, p: 13, g: 21.5, tyre: "M", status: "Track" },
            { code: "ALB", full: "Alexander Albon", t: 6, p: 14, g: 25.0, tyre: "H", status: "Track" },
            { code: "TEA", full: "Your Teammate", t: 10, p: 15, g: 26.4, tyre: "M", status: "Track" },
            { code: "TSU", full: "Yuki Tsunoda", t: 7, p: 16, g: 28.9, tyre: "S", status: "Track" },
            { code: "RIC", full: "Daniel Ricciardo", t: 7, p: 17, g: 30.1, tyre: "S", status: "Track" },
            { code: "BOT", full: "Valtteri Bottas", t: 8, p: 18, g: 35.2, tyre: "H", status: "Track" },
            { code: "ZHO", full: "Guanyu Zhou", t: 8, p: 19, g: 36.5, tyre: "H", status: "Track" },
            { code: "HUL", full: "Nico Hulkenberg", t: 9, p: 20, g: 40.0, tyre: "M", status: "Track" },
            { code: "MAG", full: "Kevin Magnussen", t: 9, p: 21, g: 41.2, tyre: "M", status: "Track" },
            { code: "COL", full: "Franco Colapinto", t: 6, p: 22, g: 45.0, tyre: "S", status: "Track" }
        ];

        let currentLap = 0;
        let raceTimeLeft = TOTAL_TIME_SECONDS;
        let showGapToLeader = true;
        let mainTimer;
        let simTimer;

        // --- RENDER FUNCTIONS ---
        function renderTiming() {
            const list = document.getElementById('timing-list');
            list.innerHTML = '';
            drivers.sort((a,b) => a.p - b.p);

            drivers.forEach(d => {
                const team = TEAMS[d.t];
                let infoText = "";
                
                if (showGapToLeader) {
                    infoText = d.p === 1 ? "LEADER" : `+${d.g.toFixed(1)}s`;
                } else {
                    if (d.p === 1) infoText = "LEADER";
                    else if (d.p === 2) infoText = `+${d.g.toFixed(1)}s`;
                    else {
                        const prevDriver = drivers.find(x => x.p === d.p - 1);
                        const interval = d.g - prevDriver.g;
                        infoText = `+${interval.toFixed(1)}s`;
                    }
                }

                if (d.status === "PIT") infoText = "PIT";
                if (d.status === "DNF") infoText = "DNF";

                const row = document.createElement('div');
                row.className = `t-row ${d.isP ? 'player' : ''}`;
                row.innerHTML = `
                    <div class="t-pos">${d.p}</div>
                    <div class="t-driver">
                        <div class="team-stripe" style="background:${team.c}"></div>
                        <div class="d-code">${d.code}</div>
                    </div>
                    <div class="tyre-badge tyre-${d.tyre}">${d.tyre}</div>
                    <div class="t-gap">${infoText}</div>
                `;
                list.appendChild(row);
            });
        }

        function addLog(text, type="normal") {
            const feed = document.getElementById('feed');
            const div = document.createElement('div');
            div.className = `c-item ${type}`;
            div.innerHTML = `<span class="c-lap">L${currentLap}</span> ${text}`;
            feed.prepend(div);
        }

        // --- DYNAMIC LAP SIMULATION ---
        function simulateLap() {
            currentLap++;
            
            // Update Gaps & Tyres
            drivers.forEach(d => {
                if(d.status === "Track") {
                    d.g += (Math.random() - 0.5) * 1.5;
                    if(d.g < 0.5 && d.p !== 1) d.g = 0.5;
                    
                    // Random Pit Stop
                    if(Math.random() > 0.97) {
                        d.status = "PIT";
                        d.tyre = "M";
                        addLog(`${d.full} masuk pit untuk ganti ban Medium.`, "strat");
                        setTimeout(() => {
                            if(d.status === "PIT") { d.status = "Track"; d.g += 22; }
                        }, 4000);
                    }
                }
            });

            // Random Overtake
            if(Math.random() > 0.7) {
                const idx = Math.floor(Math.random() * (drivers.length - 1));
                const d1 = drivers[idx];
                const d2 = drivers[idx+1];
                if(d1.status === "Track" && d2.status === "Track") {
                    let tempP = d1.p; d1.p = d2.p; d2.p = tempP;
                    addLog(`⚔️ ${d2.full} menyalip ${d1.full}!`);
                }
            }

            renderTiming();
        }

        function updateClockAndLogic() {
            raceTimeLeft--;
            const mins = Math.floor(raceTimeLeft / 60);
            const secs = raceTimeLeft % 60;
            document.getElementById('race-clock').innerText = 
                `${mins.toString().padStart(2, '0')}:${secs.toString().padStart(2, '0')}`;

            // Toggle Gap/Interval every 60 seconds
            if (raceTimeLeft % 60 === 0 && raceTimeLeft > 0) {
                showGapToLeader = !showGapToLeader;
                const label = document.getElementById('gap-label');
                label.innerText = showGapToLeader ? "GAP TO LEADER" : "INTERVAL";
                label.classList.toggle('active', showGapToLeader);
                renderTiming();
            }

            // End Race
            if (raceTimeLeft <= 0) {
                clearInterval(mainTimer);
                clearInterval(simTimer);
                addLog("🏁 CHECKERED FLAG! Balapan Selesai.", "danger");
                document.getElementById('race-clock').innerText = "FINISHED";
                document.getElementById('race-clock').style.color = "#ff1801";
                return;
            }

            // Calculate Dynamic Lap Duration
            // Rumus: Sisa Waktu / Sisa Lap = Durasi Lap Berikutnya
            const lapsRemaining = TOTAL_LAPS - currentLap;
            let nextLapDuration = 1000; // Default 1 second tick
            
            if (lapsRemaining > 0) {
                // Kita bagi sisa waktu (dalam ms) dengan sisa lap
                // Ditambah sedikit variasi acak agar tidak terlalu robotik
                const baseDuration = (raceTimeLeft * 1000) / lapsRemaining;
                const variation = (Math.random() - 0.5) * (baseDuration * 0.1); // +/- 5% variasi
                nextLapDuration = Math.max(1000, baseDuration + variation);
            }

            // Restart simulation timer with new dynamic duration
            clearInterval(simTimer);
            if (currentLap < TOTAL_LAPS) {
                simTimer = setInterval(simulateLap, nextLapDuration);
            }
        }

        // --- INIT ---
        renderTiming();
        
        // Auto Start Sequence
        let startCount = 5;
        const startIntv = setInterval(() => {
            document.getElementById('race-clock').innerText = `START ${startCount}s`;
            startCount--;
            if(startCount < 0) {
                clearInterval(startIntv);
                addLog("🚩 LIGHTS OUT! BALAPAN DIMULAI!", "danger");
                mainTimer = setInterval(updateClockAndLogic, 1000);
                updateClockAndLogic(); // Run first tick immediately
            }
        }, 1000);

    </script>
</body>
</html>
