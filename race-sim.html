<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Race Broadcast Sim</title>
    <link href="https://fonts.googleapis.com/css2?family=Racing+Sans+One&family=Roboto:wght@400;500;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-dark: #0f0f0f;
            --bg-panel: #1a1a1a;
            --border: #333;
            --text-main: #e0e0e0;
            --accent: #ff1801;
            --safe-bottom: env(safe-area-inset-bottom, 20px);
        }

        * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
        
        body {
            background-color: var(--bg-dark);
            color: var(--text-main);
            font-family: 'Roboto', sans-serif;
            min-height: 100dvh;
            overflow-y: auto;
            overflow-x: hidden;
            padding-bottom: calc(60px + var(--safe-bottom)); /* Space for bottom nav */
        }

        /* --- HEADER --- */
        .app-header {
            background: var(--bg-panel);
            padding: 12px 15px;
            border-bottom: 2px solid var(--accent);
            display: flex;
            justify-content: space-between;
            align-items: center;
            position: sticky;
            top: 0;
            z-index: 50;
        }
        .brand { font-family: 'Racing Sans One'; font-size: 18px; color: white; font-style: italic; }
        .brand span { color: var(--accent); }
        .track-info { text-align: right; font-size: 10px; color: #888; line-height: 1.3; }
        .track-info b { color: white; font-size: 11px; }

        /* --- TIMING SECTION (COMPACT) --- */
        .timing-section { background: var(--bg-panel); border-bottom: 1px solid var(--border); }
        .panel-head {
            padding: 8px 12px;
            background: #222;
            font-size: 10px;
            font-weight: bold;
            text-transform: uppercase;
            color: var(--accent);
            border-bottom: 1px solid var(--border);
            display: flex;
            justify-content: space-between;
        }
        
        .t-row {
            display: flex;
            align-items: center;
            padding: 8px 12px;
            border-bottom: 1px solid #222;
            font-size: 13px;
            height: 48px; /* Fixed height for consistency */
        }
        .t-row.player { background: rgba(255, 215, 0, 0.08); border-left: 3px solid gold; }
        
        .t-pos { width: 22px; font-weight: bold; color: #666; font-size: 13px; text-align: center; }
        
        .t-driver-col { 
            flex: 1; 
            display: flex; 
            align-items: center; 
            gap: 8px; 
            overflow: hidden;
        }
        .team-dot { width: 3px; height: 16px; border-radius: 1px; flex-shrink: 0; }
        
        .driver-name-wrap {
            display: flex;
            flex-direction: column;
            justify-content: center;
            line-height: 1.1;
        }
        .d-abbr { font-weight: 700; color: white; font-size: 14px; letter-spacing: 0.5px; }
        .d-full { font-size: 9px; color: #888; text-transform: uppercase; }
        
        /* Tyre Badge Compact */
        .tyre-badge {
            width: 16px; height: 16px;
            border-radius: 3px;
            font-size: 8px; font-weight: 900;
            display: flex; align-items: center; justify-content: center;
            color: black; flex-shrink: 0;
            border: 1px solid rgba(0,0,0,0.2);
        }
        .tyre-S { background: #ff1801; color: white; }
        .tyre-M { background: #ffe600; }
        .tyre-H { background: #ffffff; }
        .tyre-I { background: #00ff00; }
        .tyre-W { background: #0055ff; color: white; }

        .t-gap { 
            font-family: monospace; 
            font-size: 12px; 
            color: #aaa; 
            text-align: right;
            min-width: 55px;
            font-weight: 500;
            transition: opacity 0.3s;
        }

        /* --- COMMENTARY --- */
        .comm-section { background: #121212; min-height: 300px; }
        .comm-feed { padding: 12px; display: flex; flex-direction: column-reverse; }
        .c-item {
            margin-bottom: 10px;
            padding: 10px;
            background: #1a1a1a;
            border-radius: 6px;
            border-left: 3px solid #333;
            font-size: 12px;
            line-height: 1.4;
        }
        .c-item.strat { border-left-color: #00d2be; background: rgba(0, 210, 190, 0.1); }
        .c-item.danger { border-left-color: var(--accent); color: #ffaaaa; }
        .c-lap { font-weight: bold; color: #666; font-size: 9px; margin-right: 6px; }

        /* --- BOTTOM NAVIGATION MENU --- */
        .bottom-nav {
            position: fixed;
            bottom: 0; left: 0; width: 100%;
            height: calc(55px + var(--safe-bottom));
            padding-bottom: var(--safe-bottom);
            background: #1a1a1a;
            border-top: 1px solid var(--border);
            display: flex;
            justify-content: space-around;
            align-items: center;
            z-index: 100;
        }
        
        .nav-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            color: #666;
            font-size: 9px;
            text-transform: uppercase;
            gap: 4px;
            cursor: pointer;
            width: 20%;
        }
        .nav-item.active { color: var(--accent); }
        .nav-icon { font-size: 20px; }

        /* Floating Race Timer & Controls */
        .race-controls-float {
            position: fixed;
            bottom: calc(65px + var(--safe-bottom));
            left: 50%; transform: translateX(-50%);
            background: rgba(26, 26, 26, 0.95);
            backdrop-filter: blur(10px);
            padding: 8px 15px;
            border-radius: 20px;
            border: 1px solid #333;
            display: flex;
            align-items: center;
            gap: 15px;
            z-index: 90;
            box-shadow: 0 4px 15px rgba(0,0,0,0.5);
        }
        .race-time { font-family: 'Racing Sans One'; font-size: 18px; color: white; font-style: italic; }
        .btn-mini {
            background: var(--accent); color: white; border: none;
            padding: 5px 12px; border-radius: 12px;
            font-size: 10px; font-weight: bold; cursor: pointer;
        }
        .btn-mini.secondary { background: #333; }

    </style>
</head>
<body>

    <!-- Header -->
    <div class="app-header">
        <div class="brand">GRID <span>LIVE</span></div>
        <div class="track-info">
            <div>Circuit: <b>Monza 🇮🇹</b></div>
            <div>Weather: <b>Sunny (28°C)</b></div>
        </div>
    </div>

    <!-- Timing Section -->
    <div class="timing-section">
        <div class="panel-head">
            <span>Live Classification</span>
            <span id="gap-label" style="color:#fff">GAP TO LEADER</span>
        </div>
        <div class="timing-list" id="timing-list"></div>
    </div>

    <!-- Commentary -->
    <div class="comm-section">
        <div class="panel-head">Race Control Radio</div>
        <div class="comm-feed" id="feed">
            <div class="c-item">Mobil berada di grid. Strategi awal: Start Medium.</div>
        </div>
    </div>

    <!-- Floating Race Controls -->
    <div class="race-controls-float">
        <div class="race-time" id="race-timer">00:00 / 10:00</div>
        <button class="btn-mini" id="start-btn" onclick="toggleSim()">START</button>
        <button class="btn-mini secondary" onclick="resetSim()">RESET</button>
    </div>

    <!-- Bottom Navigation Menu -->
    <div class="bottom-nav">
        <div class="nav-item active">
            <div class="nav-icon">🏁</div>
            <span>Live</span>
        </div>
        <div class="nav-item">
            <div class="nav-icon">📊</div>
            <span>Timing</span>
        </div>
        <div class="nav-item">
            <div class="nav-icon">📻</div>
            <span>Radio</span>
        </div>
        <div class="nav-item">
            <div class="nav-icon">️</div>
            <span>Strategi</span>
        </div>
        <div class="nav-item">
            <div class="nav-icon">☰</div>
            <span>Menu</span>
        </div>
    </div>

    <script>
        // --- DATA ---
        const teams = [
            { n: "Red Bull", c: "#0600EF" }, { n: "Mercedes", c: "#00D2BE" },
            { n: "Ferrari", c: "#FF1801" }, { n: "McLaren", c: "#FF8700" },
            { n: "Aston Martin", c: "#006F62" }, { n: "Alpine", c: "#0090FF" },
            { n: "Williams", c: "#005AFF" }, { n: "RB", c: "#1634CB" },
            { n: "Sauber", c: "#000000" }, { n: "Haas", c: "#B6BABD" },
            { n: "Grid FC", c: "#FFD700" }
        ];

        let drivers = [];
        let lap = 0;
        let running = false;
        let timer;
        let raceSeconds = 0;
        const RACE_DURATION = 600; // 10 minutes in seconds
        
        // Gap Rotation Logic
        let gapMode = "leader"; // "leader" or "interval"
        let gapToggleTimer;

        function initDrivers() {
            drivers = [
                { n: "Verstappen", full: "Max Verstappen", t: 0, p: 1, g: 0, tyre: "M", status: "Track", isP: false },
                { n: "Perez", full: "Sergio Perez", t: 0, p: 2, g: 2.1, tyre: "M", status: "Track", isP: false },
                { n: "Hamilton", full: "Lewis Hamilton", t: 1, p: 3, g: 5.4, tyre: "H", status: "Track", isP: false },
                { n: "Russell", full: "George Russell", t: 1, p: 4, g: 6.2, tyre: "H", status: "Track", isP: false },
                { n: "Leclerc", full: "Charles Leclerc", t: 2, p: 5, g: 8.5, tyre: "S", status: "Track", isP: false },
                { n: "Sainz", full: "Carlos Sainz", t: 2, p: 6, g: 9.1, tyre: "S", status: "Track", isP: false },
                { n: "Norris", full: "Lando Norris", t: 3, p: 7, g: 12.3, tyre: "M", status: "Track", isP: false },
                { n: "Piastri", full: "Oscar Piastri", t: 3, p: 8, g: 13.0, tyre: "M", status: "Track", isP: false },
                { n: "Alonso", full: "Fernando Alonso", t: 4, p: 9, g: 15.5, tyre: "H", status: "Track", isP: false },
                { n: "Stroll", full: "Lance Stroll", t: 4, p: 10, g: 18.2, tyre: "H", status: "Track", isP: false },
                // PLAYER
                { n: "YOU", full: "Player Name", t: 10, p: 11, g: 19.5, tyre: "S", status: "Track", isP: true }, 
                { n: "Gasly", full: "Pierre Gasly", t: 5, p: 12, g: 20.1, tyre: "M", status: "Track", isP: false },
                { n: "Ocon", full: "Esteban Ocon", t: 5, p: 13, g: 21.5, tyre: "M", status: "Track", isP: false },
                { n: "Albon", full: "Alex Albon", t: 6, p: 14, g: 25.0, tyre: "H", status: "Track", isP: false },
                { n: "Teammate", full: "Team Driver", t: 10, p: 15, g: 26.4, tyre: "S", status: "Track", isP: false },
                { n: "Tsunoda", full: "Yuki Tsunoda", t: 7, p: 16, g: 28.9, tyre: "M", status: "Track", isP: false },
                { n: "Ricciardo", full: "Daniel Ricciardo", t: 7, p: 17, g: 30.1, tyre: "M", status: "Track", isP: false },
                { n: "Bottas", full: "Valtteri Bottas", t: 8, p: 18, g: 35.2, tyre: "H", status: "Track", isP: false },
                { n: "Zhou", full: "Guanyu Zhou", t: 8, p: 19, g: 36.5, tyre: "H", status: "Track", isP: false },
                { n: "Hulkenberg", full: "Nico Hulkenberg", t: 9, p: 20, g: 40.0, tyre: "M", status: "Track", isP: false },
                { n: "Magnussen", full: "Kevin Magnussen", t: 9, p: 21, g: 41.2, tyre: "M", status: "Track", isP: false },
                { n: "Colapinto", full: "Franco Colapinto", t: 6, p: 22, g: 45.0, tyre: "H", status: "Track", isP: false }
            ];
        }

        // --- RENDER ---
        function renderTiming() {
            const list = document.getElementById('timing-list');
            list.innerHTML = '';
            drivers.sort((a,b) => a.p - b.p);

            drivers.forEach(d => {
                const team = teams[d.t];
                
                // Determine Gap Text based on current mode
                let gapText = "";
                if (d.p === 1) {
                    gapText = "LEADER";
                } else if (gapMode === "leader") {
                    gapText = `+${d.g.toFixed(1)}s`;
                } else {
                    // Interval mode: gap to car ahead
                    const carAhead = drivers.find(c => c.p === d.p - 1);
                    const interval = carAhead ? (d.g - carAhead.g).toFixed(1) : "0.0";
                    gapText = `+${interval}s`;
                }

                if (d.status === "PIT") gapText = "IN PIT";
                if (d.status === "DNF") gapText = "DNF";

                const row = document.createElement('div');
                row.className = `t-row ${d.isP ? 'player' : ''}`;
                
                row.innerHTML = `
                    <div class="t-pos">${d.p}</div>
                    <div class="t-driver-col">
                        <div class="team-dot" style="background:${team.c}"></div>
                        <div class="driver-name-wrap">
                            <div class="d-abbr">${d.n}</div>
                            <div class="d-full">${d.full}</div>
                        </div>
                    </div>
                    <div class="tyre-badge tyre-${d.tyre}">${d.tyre}</div>
                    <div class="t-gap">${gapText}</div>
                `;
                list.appendChild(row);
            });
        }

        function addLog(text, type="normal") {
            const feed = document.getElementById('feed');
            const div = document.createElement('div');
            div.className = `c-item ${type}`;
            div.innerHTML = `<span class="c-lap">L${lap}</span> ${text}`;
            feed.prepend(div);
        }

        function formatTime(sec) {
            const m = Math.floor(sec / 60).toString().padStart(2, '0');
            const s = (sec % 60).toString().padStart(2, '0');
            return `${m}:${s}`;
        }

        // --- GAP ROTATION LOGIC ---
        function startGapRotation() {
            clearInterval(gapToggleTimer);
            gapToggleTimer = setInterval(() => {
                gapMode = gapMode === "leader" ? "interval" : "leader";
                document.getElementById('gap-label').innerText = 
                    gapMode === "leader" ? "GAP TO LEADER" : "INTERVAL";
                renderTiming(); // Re-render to update text
            }, 5000); // Toggle every 5 seconds
        }

        // --- SIMULATION ---
        function simulateLap() {
            if(raceSeconds >= RACE_DURATION) { finishRace(); return; }
            
            raceSeconds++;
            document.getElementById('race-timer').innerText = 
                `${formatTime(raceSeconds)} / ${formatTime(RACE_DURATION)}`;

            // Only update lap counter roughly every 90 seconds (simulated)
            if(raceSeconds % 90 === 0) {
                lap++;
                addLog(`Lap ${lap} underway...`);
            }

            drivers.forEach(d => {
                if(d.status === "Track") {
                    d.g += (Math.random() - 0.5) * 1.5;
                    if(d.g < 0.5 && d.p !== 1) d.g = 0.5;
                    
                    // Random Pit Stop
                    if(Math.random() > 0.995) {
                        d.status = "PIT";
                        d.tyre = "M";
                        addLog(`️ ${d.full} boxes for fresh tyres.`);
                        setTimeout(() => {
                            if(d.status === "PIT") { d.status = "Track"; d.g += 20; }
                        }, 4000);
                    }
                }
            });

            // Overtakes
            if(Math.random() > 0.8) {
                const idx = Math.floor(Math.random() * (drivers.length - 1));
                const d1 = drivers[idx];
                const d2 = drivers[idx+1];
                if(d1.status === "Track" && d2.status === "Track") {
                    let tempP = d1.p; d1.p = d2.p; d2.p = tempP;
                    addLog(`⚔️ ${d2.full} overtakes ${d1.full}!`);
                }
            }

            renderTiming();
        }

        function toggleSim() {
            const btn = document.getElementById('start-btn');
            if(running) {
                clearInterval(timer);
                clearInterval(gapToggleTimer);
                running = false;
                btn.innerText = "RESUME";
                btn.style.background = "#333";
            } else {
                if(raceSeconds === 0) addLog("🚩 LIGHTS OUT! BALAPAN DIMULAI!", "danger");
                running = true;
                btn.innerText = "PAUSE";
                btn.style.background = "#ff1801";
                timer = setInterval(simulateLap, 1000);
                startGapRotation();
            }
        }

        function resetSim() {
            clearInterval(timer);
            clearInterval(gapToggleTimer);
            running = false;
            lap = 0;
            raceSeconds = 0;
            gapMode = "leader";
            
            document.getElementById('race-timer').innerText = `00:00 / ${formatTime(RACE_DURATION)}`;
            document.getElementById('gap-label').innerText = "GAP TO LEADER";
            
            const btn = document.getElementById('start-btn');
            btn.innerText = "START";
            btn.style.background = "#ff1801";

            document.getElementById('feed').innerHTML = '<div class="c-item">Mobil berada di grid. Strategi awal: Start Medium.</div>';
            initDrivers();
            renderTiming();
        }

        function finishRace() {
            clearInterval(timer);
            clearInterval(gapToggleTimer);
            running = false;
            addLog(" CHECKERED FLAG! Balapan Selesai.", "strat");
            document.getElementById('start-btn').innerText = "FINISHED";
        }

        // Init
        initDrivers();
        renderTiming();

    </script>
</body>
</html>
