<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Profil - Grid Manager</title>
    <link href="https://fonts.googleapis.com/css2?family=Racing+Sans+One&family=Roboto:wght@400;700&display=swap" rel="stylesheet">
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        
        body {
            background-color: #0f0f0f;
            color: #e0e0e0;
            font-family: 'Roboto', sans-serif;
            padding-bottom: 90px;
        }

        /* --- PROFILE HEADER --- */
        .profile-header {
            background: linear-gradient(180deg, #1a1a1a, #0f0f0f);
            padding: 30px 20px;
            text-align: center;
            border-bottom: 1px solid #333;
        }
        .avatar-container {
            width: 100px; height: 100px;
            background: #333;
            border-radius: 50%;
            margin: 0 auto 15px;
            border: 3px solid #ff1801;
            display: flex; align-items: center; justify-content: center;
            font-size: 40px;
            position: relative;
        }
        .level-badge {
            position: absolute; bottom: 0; right: 0;
            background: #ff1801; color: white;
            width: 30px; height: 30px;
            border-radius: 50%;
            display: flex; align-items: center; justify-content: center;
            font-weight: bold; font-size: 12px;
            border: 2px solid #0f0f0f;
        }
        .manager-name { font-family: 'Racing Sans One'; font-size: 24px; color: white; margin-bottom: 5px; }
        .team-tag { font-size: 12px; color: #888; background: #222; padding: 4px 10px; border-radius: 10px; display: inline-block; }

        /* --- STATS GRID --- */
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 10px;
            padding: 20px;
        }
        .stat-box {
            background: #1a1a1a;
            border: 1px solid #333;
            border-radius: 10px;
            padding: 15px 10px;
            text-align: center;
        }
        .stat-val { font-family: 'Racing Sans One'; font-size: 20px; color: white; }
        .stat-lbl { font-size: 10px; color: #666; text-transform: uppercase; margin-top: 4px; }
