<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Race Hub - Grid Manager</title>
    <link href="https://fonts.googleapis.com/css2?family=Racing+Sans+One&family=Roboto:wght@400;700&display=swap" rel="stylesheet">
    <style>
        /* Gunakan style dasar yang sama */
        body { background-color: #0f0f0f; color: white; font-family: 'Roboto', sans-serif; padding-bottom: 80px; }
        
        .hero-race {
            background: linear-gradient(rgba(0,0,0,0.7), rgba(0,0,0,0.7)), url('https://images.unsplash.com/photo-1568605117036-5fe5e7bab0b7?auto=format&fit=crop&w=800&q=80');
            background-size: cover;
            background-position: center;
            height: 250px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            border-bottom: 2px solid #ff1801;
        }

        .race-title { font-family: 'Racing Sans One', cursive; font-size: 32px; color: white; text-shadow: 0 2px 10px black; }
        .race-track { color: #ff1801; font-weight: bold; letter-spacing: 2px; margin-top: 5px; }

        .countdown-box {
            background: #1a1a1a;
            border: 1px solid #333;
            border-radius: 15px;
            padding: 20px;
            margin: 20px;
            text-align: center;
        }

        .timer-display {
            font-family: 'Racing Sans One', cursive;
            font-size: 40px;
            color: #00ff00;
            margin: 10px 0;
        }

        .status-badge {
            background: #333;
            color: #aaa;
            padding: 5px 15px;
            border-radius: 20px;
            font-size: 12px;
            text-transform: uppercase;
        }

        .prep-list { padding: 0 20px; }
        .prep-item {
            background: #222;
            padding: 15px;
            border-radius: 10px;
            margin-bottom: 10px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        
        .btn-prep {
            background: #0055ff;
            color: white;
            border: none;
            padding: 8px 15px;
            border-radius: 8px;
            cursor: pointer;
        }
    </style>
</head>
<body>

    <!-- Header -->
    <div class="app-header" style="background:#1a1a1a; padding:15px 20px; border-bottom:1px solid #333;">
        <a href="dashboard.html" class="logo" style="font-family:'Racing Sans One'; color:white; text-decoration:none; font-size:20px;">GRID <span style="color:#ff1801">MANAGER</span></a>
        <a href="dashboard.html" class="header-link" style="font-size:12px; color:#aaa; text-decoration:none; border:1px solid #333; padding:5px 10px; border-radius:20px;">🏠 Dashboard</a>
    </div>

    <!-- Hero Section -->
    <div class="hero-race">
        <div class="race-title">GRAND PRIX MONACO</div>
        <div class="race-track">CIRCUIT DE MONTE-CARLO</div>
    </div>

    <!-- Countdown -->
    <div class="countdown-box">
        <div class="status-badge" id="raceStatus">MENUNGGU JADWAL</div>
        <div class="timer-display" id="countdown">00:00:00</div>
        <p style="color:#888; font-size:12px;">Balapan akan dimulai secara otomatis.</p>
    </div>

    <!-- Persiapan Tim -->
    <div class="prep-list">
        <h3 style="font-family:'Racing Sans One'; margin-bottom:15px;">PERSIAPAN TIM</h3>
        
        <div class="prep-item">
            <div>
                <strong>Setup Aerodinamika</strong>
                <p style="font-size:12px; color:#888;">Tingkatkan downforce untuk tikungan tajam.</p>
            </div>
            <button class="btn-prep">Optimalkan</button>
        </div>

        <div class="prep-item">
            <div>
                <strong>Strategi Ban</strong>
                <p style="font-size:12px; color:#888;">Pilih compound ban untuk race day.</p>
            </div>
            <button class="btn-prep">Pilih Ban</button>
        </div>
    </div>

    <!-- Footer -->
    <div class="bottom-nav" style="position:fixed; bottom:0; left:0; width:100%; background:#1a1a1a; border-top:1px solid #333; display:flex; justify-content:space-around; padding:12px 0;">
        <a href="dashboard.html" class="nav-item" style="text-align:center; color:#666; text-decoration:none; font-size:10px;"><span style="display:block; font-size:20px;">🏠</span>Home</a>
        <a href="race-hub.html" class="nav-item active" style="text-align:center; color:#ff1801; text-decoration:none; font-size:10px;"><span style="display:block; font-size:20px;">🚩</span>Race</a>
        <a href="profile.html" class="nav-item" style="text-align:center; color:#666; text-decoration:none; font-size:10px;"><span style="display:block; font-size:20px;">⚙️</span>Profil</a>
    </div>

    <script>
        // --- LOGIKA JADWAL REAL-TIME ---
        
        // Kamu sebagai developer mengatur jamnya di sini (Format 24 jam)
        const RACE_HOUR = 19; 
        const RACE_MINUTE = 0; 

        function updateCountdown() {
            const now = new Date();
            let raceTime = new Date();
            
            raceTime.setHours(RACE_HOUR, RACE_MINUTE, 0, 0);

            // Jika waktu race hari ini sudah lewat, set ke besok
            if (now > raceTime) {
                raceTime.setDate(raceTime.getDate() + 1);
            }

            const diff = raceTime - now;
            
            const hours = Math.floor((diff % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
            const minutes = Math.floor((diff % (1000 * 60 * 60)) / (1000 * 60));
            const seconds = Math.floor((diff % (1000 * 60)) / 1000);

            document.getElementById("countdown").innerHTML = 
                `${hours.toString().padStart(2, '0')}:${minutes.toString().padStart(2, '0')}:${seconds.toString().padStart(2, '0')}`;

            // Logika Status
            if (diff < 1000) {
                document.getElementById("raceStatus").innerText = "BALAPAN SEDANG BERJALAN!";
                document.getElementById("raceStatus").style.background = "#ff1801";
                document.getElementById("raceStatus").style.color = "white";
            } else if (diff < 300000) { // Kurang dari 5 menit
                document.getElementById("raceStatus").innerText = "MENUJU GRID START";
                document.getElementById("raceStatus").style.background = "#ffd700";
                document.getElementById("raceStatus").style.color = "black";
            }
        }

        setInterval(updateCountdown, 1000);
        updateCountdown();
    </script>
</body>
</html>
